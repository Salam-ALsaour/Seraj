                          <div style="margin-top: 14px;">
                            <div style="font-size: 12px; font-weight: 600; color: var(--txt-dim); margin-bottom: 10px; text-align: right;">
                              <div style="width:12px; height:12px; display:inline-block; vertical-align:middle; margin-left:4px;" x-html="getIconSvg('file-text')"></div>
                              إجاباتك المسلّمة:
                            </div>
                            <template x-for="(q, qi) in ch.questions" :key="qi">
                              <div class="glass" style="padding: 12px 14px; margin-bottom: 8px; border-radius: 12px; text-align: right;">
                                <div style="font-size: 11px; font-weight: 600; color: var(--orange); margin-bottom: 4px;" x-text="q"></div>
                                <div style="font-size: 12px; color: var(--txt); line-height: 1.6;" x-text="getWeeklyAnswer(ch.week, qi)"></div>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </template>

                    <!-- Not submitted -->
                    <template x-if="!hasWeeklySubmission(ch.week)">
                      <div class="glass" style="padding: 30px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.06);">
                        <div style="width: 46px; height: 46px; margin: 0 auto 12px; color: var(--txt-faint); opacity: 0.7;" x-html="getIconSvg('clock')"></div>
                        <div style="font-size: 16px; font-weight: 700; color: var(--txt-dim); margin-bottom: 6px;">لقد انتهت مدة التحدي</div>
                        <div style="font-size: 11px; color: var(--txt-faint);">لم تشارك في هذا التحدي، ترقّب التحديات القادمة!</div>
                      </div>
                    </template>
                  </div>
                </template>

                <!-- Active (not ended) challenge -->
                <template x-if="!ch.ended">
                  <div>
                    <template x-if="hasWeeklySubmission(ch.week)">
                      <div>
                        <div class="glass" style="padding: 20px; text-align: center; border: 1px solid rgba(5,150,105,0.2); background: linear-gradient(160deg, rgba(5,150,105,0.06), transparent);">
                          <div style="width: 44px; height: 44px; margin: 0 auto 12px; color: #34d399; filter: drop-shadow(0 0 8px rgba(5,150,105,0.4));" x-html="getIconSvg('check-circle')"></div>
                          <div style="font-size: 15px; font-weight: 700; color: #a7f3d0; margin-bottom: 6px;" x-text="ch.questions && ch.questions.length > 0 ? 'تم تسليم إجابتك بنجاح!' : 'تم تسليم مشاركتك بنجاح!'"></div>
                          <div style="font-size: 11px; color: var(--txt-dim);" x-text="ch.questions && ch.questions.length > 0 ? 'لا يمكن التسليم مرة أخرى لهذا التحدي' : 'تم تسجيل تسليمك من قبل المشرفين'"></div>
                        </div>
                        <template x-if="ch.questions && ch.questions.length > 0">
                          <div style="margin-top: 14px;">
                            <div style="font-size: 12px; font-weight: 600; color: var(--txt-dim); margin-bottom: 10px; text-align: right;">
                              <div style="width:12px; height:12px; display:inline-block; vertical-align:middle; margin-left:4px;" x-html="getIconSvg('file-text')"></div>
                              إجاباتك المسلّمة:
                            </div>
                            <template x-for="(q, qi) in ch.questions" :key="qi">
                              <div class="glass" style="padding: 12px 14px; margin-bottom: 8px; border-radius: 12px; text-align: right;">
                                <div style="font-size: 11px; font-weight: 600; color: var(--orange); margin-bottom: 4px;" x-text="q"></div>
                                <div style="font-size: 12px; color: var(--txt); line-height: 1.6;" x-text="getWeeklyAnswer(ch.week, qi)"></div>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </template>
                    <template x-if="!hasWeeklySubmission(ch.week)">
                      <div>
                        <!-- Questionnaire for challenges with questions (like Week 1) -->
                        <template x-if="ch.questions && ch.questions.length > 0">
                          <div>
                            <div style="font-size: 12px; font-weight: 600; color: var(--txt-dim); margin-bottom: 10px; text-align: right;">
                              <div style="width:12px; height:12px; display:inline-block; vertical-align:middle; margin-left:4px;" x-html="getIconSvg('edit-3')"></div>
                              أجب على الأسئلة التالية:
                            </div>
                            <template x-for="(q, qi) in ch.questions" :key="qi">
                              <div style="margin-bottom: 14px; text-align: right;">
                                <label style="display: block; font-size: 12px; font-weight: 600; color: #ffb27a; margin-bottom: 6px;">
                                  <span style="display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 6px; background: rgba(249,115,22,0.12); border: 1px solid rgba(249,115,22,0.2); font-size: 10px; color: var(--orange); margin-left: 6px; vertical-align: middle;" x-text="qi + 1"></span>
                                  <span x-text="q"></span>
                                </label>
                                <textarea
                                  x-model="weeklyFormAnswers[qi]"
                                  :maxlength="getWeeklyAnswerLimit(qi)"
                                  :placeholder="'اكتب إجابتك هنا...'"
                                  @input="weeklyFormAnswers[qi] = limitWeeklyAnswer(weeklyFormAnswers[qi], qi)"
                                  style="width: 100%; min-height: 70px; padding: 12px 14px; font-size: 12px; font-family: inherit; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; resize: vertical; line-height: 1.6; transition: border-color 0.2s; box-sizing: border-box;"
                                  onfocus="this.style.borderColor='rgba(249,115,22,0.4)'"
                                  onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
                                ></textarea>
                                <div style="font-size: 10px; color: var(--txt-faint); text-align: left; margin-top: 4px; direction: ltr;"
                                     x-text="(weeklyFormAnswers[qi] || '').length + ' / ' + getWeeklyAnswerLimit(qi)"></div>
                              </div>
                            </template>
                            <button
                              @click="submitWeeklyChallenge(ch.week)"
                              :disabled="weeklySubmitting || !weeklyAnswersValid()"
                              class="btn-redeem"
                              style="width: 100%; padding: 13px; font-size: 14px; font-weight: 700; border-radius: 14px; margin-top: 4px;"
                              :style="!weeklyAnswersValid() ? 'opacity: 0.4; cursor: not-allowed;' : ''">
                              <span x-show="!weeklySubmitting">تسليم الإجابات</span>
                              <span x-show="weeklySubmitting">جاري التسليم...</span>
                            </button>
                          </div>
                        </template>

                        <!-- Notice for confirmation-only challenges (like Week 2) when not submitted yet -->
                        <template x-if="!ch.questions || ch.questions.length === 0">
                          <div class="glass" style="padding: 22px 20px; text-align: center; border: 1.5px solid rgba(239,68,68,0.2); background: linear-gradient(160deg, rgba(239,68,68,0.04), transparent); border-radius: 18px;">
                            <div style="width: 44px; height: 44px; margin: 0 auto 10px; color: #f87171; filter: drop-shadow(0 0 8px rgba(239,68,68,0.3));" x-html="getIconSvg('alert-circle')"></div>
                            <div style="font-size: 16px; font-weight: 800; color: #fca5a5; margin-bottom: 6px;">لم تقم بتسليم المشاركة بعد</div>
                            <div style="font-size: 12px; color: var(--txt-dim); line-height: 1.6;">
                              يرجى تسليم النموذج الورقي أو النموذج الإلكتروني ليقوم المشرف بتسجيل اسمك وتحديث حالتك.
                            </div>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            <!-- ============ ADMIN VIEW ============ -->
            <template x-if="isAdmin">
              <div style="margin-top: 4px;">

                <!-- Add Student Submission Section (Only for challenges with no questions) -->
                <template x-if="ch.questions && ch.questions.length === 0 && !isWeekPublished(ch.week)">
                  <div class="glass" style="padding: 14px; margin-bottom: 16px; border: 1.5px solid rgba(249,115,22,0.15); text-align: right;">
                    <div style="font-size: 13px; font-weight: 700; color: #ffb27a; margin-bottom: 10px;">
                      تسجيل تسليم يدوي لطالب:
                    </div>
                    <div style="display: flex; gap: 8px;">
                      <select x-model="adminSelectedStudentId" 
                              style="flex: 1; padding: 10px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--stroke); color: #fff; font-family: inherit; font-size: 12px; outline: none;">
                        <option value="" style="background: var(--bg);">اختر الطالب...</option>
                        <template x-for="st in students.filter(s => !weeklySubmissions[s.id + '_w' + ch.week])" :key="st.id">
                          <option :value="st.id" style="background: var(--bg);" x-text="st.name"></option>
                        </template>
                      </select>
                      <button @click="addWeeklySubmissionByAdmin(ch.week, adminSelectedStudentId); adminSelectedStudentId = '';"
                              :disabled="!adminSelectedStudentId"
                              class="btn-redeem" 
                              style="padding: 10px 18px; font-size: 12px; font-weight: 700; border-radius: 12px; margin-top: 0; white-space: nowrap;"
                              :style="!adminSelectedStudentId ? 'opacity: 0.4; cursor: not-allowed;' : ''">
                        إضافة تسليم
                      </button>
                    </div>
                  </div>
                </template>
                <div class="macro-label" style="color: var(--txt-dim); margin-top:0;">
                  <div style="width:14px; height:14px; display:inline-block; vertical-align:middle; margin-left:4px;" x-html="getIconSvg('clipboard-list')"></div>
                  تسليمات الطلاب وتقييمها
                  <span style="font-size:10px; font-weight:400; color:var(--txt-faint); margin-right:6px;" x-text="'(' + getWeekSubmissionsCount(ch.week) + ' من ' + students.length + ')'"></span>
                </div>

                <template x-if="isWeekPublished(ch.week)">
                  <div class="glass" style="padding:12px 14px; margin-bottom:12px; border:1px solid rgba(5,150,105,0.25); background:rgba(5,150,105,0.06); display:flex; align-items:center; gap:8px;">
                    <div style="width:18px; height:18px; color:#34d399; flex-shrink:0;" x-html="getIconSvg('check-circle')"></div>
                    <span style="font-size:12px; font-weight:700; color:#a7f3d0;">تم تسليم التقييم ومنح الشعلات لكل طالب.</span>
                  </div>
                </template>

                <template x-if="!isWeekPublished(ch.week) && getWeekSubmissionsCount(ch.week) > 0">
                  <div style="font-size:11px; color:var(--txt-faint); margin-bottom:10px; text-align:right; line-height:1.6;">
                    قيّم فكرة كل طالب وأدخل عدد الشعلات المناسب واحفظه كمسودة، وعند الانتهاء اضغط «تسليم التقييم» ليحصل كل طالب على شعلاته.
                  </div>
                </template>

                <div class="glass" style="padding: 8px; max-height: 560px; overflow-y: auto;">
                  <template x-for="sub in getWeeklySubmissionsForWeek(ch.week)" :key="sub.studentId">
                    <div style="padding: 12px; border-bottom: 1px solid var(--stroke);">
                      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                        <template x-if="getStudentById(sub.studentId)">
                          <div style="width: 28px; height: 28px; border-radius: 9px; display: grid; place-items: center; border: 1px solid var(--stroke); font-size: 13px;"
                               :style="'color:' + avatarColorLightMap[(getStudentById(sub.studentId).avatarColor || 'orange')] + '; background: linear-gradient(150deg,' + avatarColorGlowMap[(getStudentById(sub.studentId).avatarColor || 'orange')] + ',transparent);'">
                            <div style="width: 14px; height: 14px;" x-html="getIconSvg(getStudentById(sub.studentId).avatarIcon || 'user')"></div>
                          </div>
                        </template>
                        <div style="flex:1; min-width:0;">
                          <span style="display:block; font-size: 13px; font-weight: 700; color: var(--txt);" x-text="sub.studentName"></span>
                          <span style="display:block; font-size: 10px; color: var(--txt-faint);" x-text="sub.submittedAt || 'بدون وقت تسليم'"></span>
                        </div>
                        <template x-if="isWeekPublished(ch.week)">
                          <span class="wk-flames-badge">
                            <div style="width:12px;height:12px;" x-html="getIconSvg('flame')"></div>
                            <span x-text="(getWeeklySubmissionFlames(ch.week, sub.studentId) || 0)"></span>
                          </span>
                        </template>
                      </div>

                      <template x-for="(q, qi) in ch.questions" :key="qi">
                        <div style="margin-bottom: 8px; padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,0.02); text-align: right;">
                          <div style="font-size: 10px; font-weight: 600; color: var(--orange); margin-bottom: 2px;" x-text="q"></div>
                          <div style="font-size: 11px; color: var(--txt); line-height: 1.5; white-space: pre-wrap;" x-text="sub.answers ? (sub.answers[qi] || '') : ''"></div>
                        </div>
                      </template>

                      <!-- Evaluation inputs (before publishing) -->
                      <template x-if="!isWeekPublished(ch.week)">
                        <div>
                          <div style="display:grid; grid-template-columns: 130px 1fr; gap:8px; margin-top:10px;">
                            <div style="position:relative;">
                              <input type="number" min="0" max="999" inputmode="numeric"
                                     :value="getWeeklySubmissionFlames(ch.week, sub.studentId)"
                                     @input="setWeeklySubmissionFlames(ch.week, sub.studentId, $event.target.value)"
                                     placeholder="الشعلات"
                                     style="width:100%; padding:9px 30px 9px 10px; border-radius:10px; background:rgba(0,0,0,0.22); border:1px solid var(--stroke); color:#ffb27a; font-family:inherit; font-size:13px; font-weight:800;">
                              <div style="position:absolute; right:9px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--orange); pointer-events:none;" x-html="getIconSvg('flame')"></div>
                            </div>
                            <input type="text"
                                   :value="getWeeklySubmissionNote(ch.week, sub.studentId)"
                                   @input="setWeeklySubmissionNote(ch.week, sub.studentId, $event.target.value)"
                                   placeholder="ملاحظة على الفكرة (اختياري)"
                                   style="width:100%; padding:9px 10px; border-radius:10px; background:rgba(0,0,0,0.22); border:1px solid var(--stroke); color:var(--txt); font-family:inherit; font-size:11px;">
                          </div>
                          <div style="display:flex; flex-wrap:wrap; gap:7px; margin-top:10px;">
                            <button type="button" @click="saveWeeklyEvaluation(ch.week, sub.studentId)"
                                    style="padding:7px 12px; border-radius:10px; background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.25); color:#34d399; font-size:10px; font-weight:800; cursor:pointer;">حفظ المسودة</button>
                            <button type="button" @click="deleteWeeklySubmission(ch.week, sub.studentId)"
                                    style="margin-right:auto; padding:7px 12px; border-radius:10px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:#fca5a5; font-size:10px; font-weight:800; cursor:pointer;">حذف الإجابة</button>
                          </div>
                        </div>
                      </template>

                      <!-- Published: read-only note -->
                      <template x-if="isWeekPublished(ch.week) && getWeeklySubmissionNote(ch.week, sub.studentId)">
                        <div style="margin-top:8px; padding:8px 10px; border-radius:10px; background:rgba(249,115,22,0.05); border:1px solid rgba(249,115,22,0.15); text-align:right;">
                          <div style="font-size:10px; font-weight:700; color:#ffb27a; margin-bottom:2px;">ملاحظة المشرف</div>
                          <div style="font-size:11px; color:var(--txt-dim); line-height:1.5;" x-text="getWeeklySubmissionNote(ch.week, sub.studentId)"></div>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template x-if="getWeekSubmissionsCount(ch.week) === 0">
                    <div class="empty-note">لم يسلّم أي طالب.</div>
                  </template>
                </div>

                <!-- Publish button -->
                <template x-if="!isWeekPublished(ch.week) && getWeekSubmissionsCount(ch.week) > 0">
                  <button @click="publishWeeklyEvaluation(ch.week)"
                          class="btn-redeem"
                          style="width:100%; padding:13px; font-size:14px; font-weight:700; border-radius:14px; margin-top:14px;">
                    تسليم التقييم ومنح الشعلات
                  </button>
                </template>
              </div>
            </template>

            <!-- ============ RESULTS (shown to all after publishing) ============ -->
            <template x-if="isWeekPublished(ch.week)">
              <div style="margin-top: 22px;">
                <div class="macro-label" style="color: var(--txt-dim);">
                  <div style="width:14px; height:14px; display:inline-block; vertical-align:middle; margin-left:4px;" x-html="getIconSvg('trophy')"></div>
                  نتائج التحدي — الشعلات لكل مشارك
                </div>
                <div class="glass" style="padding: 8px 6px;">
                  <template x-for="(r, ri) in getWeeklyResults(ch.week)" :key="r.studentId">
                    <div class="wk-res-row" :class="r.studentId === activeId ? 'me' : ''">
                      <div class="wk-res-rank" x-text="ri + 1"></div>
                      <template x-if="getStudentById(r.studentId)">
                        <div class="wk-res-av"
                             :style="'color:' + avatarColorLightMap[(getStudentById(r.studentId).avatarColor || 'orange')] + '; background: linear-gradient(150deg,' + avatarColorGlowMap[(getStudentById(r.studentId).avatarColor || 'orange')] + ',transparent);'">
                          <div style="width:16px; height:16px;" x-html="getIconSvg(getStudentById(r.studentId).avatarIcon || 'user')"></div>
                        </div>
                      </template>
                      <div class="wk-res-name">
                        <span x-text="r.studentName"></span>
                        <template x-if="r.studentId === activeId">
                          <span style="font-size:9px; font-weight:700; background:rgba(249,115,22,0.2); border:1px solid rgba(249,115,22,0.4); color:#ffb27a; padding:1px 6px; border-radius:6px;">أنت</span>
                        </template>
                      </div>
                      <div class="wk-res-pts">
                        <div style="width:14px;height:14px;" x-html="getIconSvg('flame')"></div>
                        <span x-text="r.flames"></span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

          </div>
        </template>

      </div>

      <!-- ============================================== -->
      <!-- 7. ⚙️ ADMIN PANEL VIEW -->
      <!-- ============================================== -->
      <div x-show="currentScreen === 'admin'" class="page">
        
        <!-- Core Admin controls -->
        <template x-if="isAdmin">
          <div>
            <!-- Main Admin Switcher (Three Tabs: Students, Requests & Notifications Management) -->
            <div class="admin-main-toggle">
              <div class="admin-main-toggle-ind" :class="adminMainTab === 'requests' ? 'req' : (adminMainTab === 'notifications' ? 'notif' : '')"></div>
              <button :class="adminMainTab === 'students' ? 'active' : ''" @click="adminMainTab = 'students'">
                <div style="width:14px; height:14px; display:inline-block; vertical-align:middle; margin-left:3px;" x-html="getIconSvg('users')"></div>إدارة الطلاب
              </button>
              <button :class="adminMainTab === 'requests' ? 'active' : ''" @click="adminMainTab = 'requests'">
                <div style="width:14px; height:14px; display:inline-block; vertical-align:middle; margin-left:3px;" x-html="getIconSvg('clipboard-list')"></div>إدارة الطلبات
              </button>
              <button :class="adminMainTab === 'notifications' ? 'active' : ''" @click="adminMainTab = 'notifications'">
                <div style="width:14px; height:14px; display:inline-block; vertical-align:middle; margin-left:3px;" x-html="getIconSvg('bell')"></div>إدارة الإشعارات
              </button>
            </div>

            <!-- Tab 1: Students Management -->
            <div x-show="adminMainTab === 'students'">
              <!-- Stage Filter Toggle -->
              <div class="stage-toggle">
                <div class="stage-toggle-ind" :class="adminStageFilter === 'middle' ? 'mid' : (adminStageFilter === 'high' ? 'high' : '')"></div>
                <button :class="adminStageFilter === 'all' ? 'active' : ''" @click="setAdminStageFilter('all')">
                  الكل
                </button>
                <button :class="adminStageFilter === 'middle' ? 'active' : ''" @click="setAdminStageFilter('middle')">
                  المتوسط
                </button>
                <button :class="adminStageFilter === 'high' ? 'active' : ''" @click="setAdminStageFilter('high')">
                  الثانوي
                </button>
              </div>

              <!-- Students Horizontal Carousel -->
              <div class="admin-bar">
                <template x-for="st in students.filter(s => adminStageFilter === 'all' || s.stage === adminStageFilter)" :key="st.id">
                  <div class="admin-chip" :class="st.id === adminActiveStudentId ? 'active' : ''" @click="adminActiveStudentId === st.id ? (viewOnlyStudentId = st.id) : (adminActiveStudentId = st.id)">
                    <div class="admin-chip-av"
                         style="position:relative;"
                         :style="{
                           'border-color': st.id === adminActiveStudentId ? avatarColorMap[st.avatarColor || 'orange'] : 'var(--stroke)',
                           'color': avatarColorLightMap[st.avatarColor || 'orange'],
                           'background': st.id === adminActiveStudentId ? 'linear-gradient(150deg,' + avatarColorGlowMap[st.avatarColor || 'orange'] + ',transparent)' : 'linear-gradient(150deg,var(--glass2),transparent)'
                         }">
                      <div style="width:20px; height:20px;" x-html="getIconSvg(st.avatarIcon || 'user')"></div>
                      <!-- Level Badge -->
                      <div style="position:absolute; bottom:-4px; right:-4px; width:12px; height:12px; border-radius:50%; background:var(--bg2); border:0.8px solid var(--stroke2); color:var(--orange); display:grid; place-items:center; z-index:5;"
                           :title="getStudentLevelInfo(st.total).current.label">
                        <div style="width:7px; height:7px;" x-html="getIconSvg(getStudentLevelInfo(st.total).current.icon)"></div>
                      </div>
                    </div>
                    <div class="admin-chip-name" x-text="st.name.split(' ')[0]"></div>
                    <div class="admin-chip-name2" x-text="st.name.split(' ')[1] || ''"></div>
                    <div class="admin-chip-pts" x-text="st.total + ' شعلة'"></div>
                  </div>
                </template>
              </div>

              <!-- Admin Controls Switcher Toggle -->
              <div class="admin-toggle">
                <div class="admin-toggle-ind" :class="adminTab === 'neg' ? 'neg' : (adminTab === 'badges' ? 'ach' : '')"></div>
                <button :class="adminTab === 'pos' ? 'active' : ''" @click="adminTab = 'pos'">
                  <div style="width:14px; height:14px; display:inline-block; vertical-align:middle; margin-left:3px;" x-html="getIconSvg('plus-circle')"></div>إضافة شعلات
                </button>
                <button :class="adminTab === 'neg' ? 'active' : ''" @click="adminTab = 'neg'">
                  <div style="width:14px; height:14px; display:inline-block; vertical-align:middle; margin-left:3px;" x-html="getIconSvg('minus-circle')"></div>خصم شعلات
                </button>
                <button :class="adminTab === 'badges' ? 'active' : ''" @click="adminTab = 'badges'">
                  <div style="width:14px; height:14px; display:inline-block; vertical-align:middle; margin-left:3px;" x-html="getIconSvg('award')"></div>الأوسمة
                </button>

      <div style="display:flex; flex-direction:column; gap:14px; margin-bottom:20px; direction:rtl; text-align:center;">
        <template x-for="lvl in [

          { level: 2, min: 100, max: 250, label: 'شعلة نشيطة', icon: 'flame', color: 'orange' },
          { level: 3, min: 250, max: 500, label: 'منارة المعرفة', icon: 'book-open', color: 'blue' },
          { level: 4, min: 500, max: 800, label: 'فارس سراج', icon: 'shield', color: 'purple' },
          { level: 5, min: 800, max: 999999, label: 'سفير سراج', icon: 'crown', color: 'yellow' }
        ]" :key="lvl.level">
          <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 16px; border-radius: 20px; border: 1px solid var(--stroke); transition: all 0.2s;"
               :style="getStudentLevelInfo(currentStudent.total).current.level === lvl.level 
                       ? 'background: rgba(249,115,22,0.05); border-color: rgba(249,115,22,0.35); box-shadow: 0 0 16px rgba(249,115,22,0.08);' 
                       : 'background: rgba(255,255,255,0.015); border-color: var(--stroke);'"
               :class="getStudentLevelInfo(currentStudent.total).current.level === lvl.level ? 'current-level-active' : ''">
            
            <!-- Circular Progress SVG & Icon -->
            <div style="position: relative; width: 80px; height: 80px; display: grid; place-items: center; margin-bottom: 10px;">
              <svg style="position: absolute; transform: rotate(-90deg); width: 80px; height: 80px;">
                <!-- Background Circle -->
                <circle cx="40" cy="40" r="34" stroke="rgba(255,255,255,0.05)" stroke-width="3" fill="transparent" />
                <!-- Foreground Circle -->
                <circle cx="40" cy="40" r="34" 
                        :stroke="
                          getStudentLevelInfo(currentStudent.total).current.level > lvl.level 
                            ? '#10b981' 
                            : (getStudentLevelInfo(currentStudent.total).current.level === lvl.level ? '#f97316' : 'rgba(255,255,255,0.08)')
                        " 
                        stroke-width="4" 
                        fill="transparent" 
                        stroke-dasharray="213.63" 
                        :stroke-dashoffset="
                          getStudentLevelInfo(currentStudent.total).current.level > lvl.level 
                            ? 0 
                            : (getStudentLevelInfo(currentStudent.total).current.level === lvl.level 
                                ? (213.63 * (1 - getStudentLevelInfo(currentStudent.total).percent / 100)) 
                                : 213.63)
                        " 
                        stroke-linecap="round"
                        :style="getStudentLevelInfo(currentStudent.total).current.level === lvl.level 
                                ? 'filter: drop-shadow(0 0 4px rgba(249,115,22,0.6)); transition: stroke-dashoffset 0.6s ease-in-out;' 
                                : (getStudentLevelInfo(currentStudent.total).current.level > lvl.level 
                                    ? 'filter: drop-shadow(0 0 4px rgba(16,185,129,0.5)); transition: stroke-dashoffset 0.6s ease-in-out;' 
                                    : 'transition: stroke-dashoffset 0.6s ease-in-out;')" />
              </svg>
              
              <!-- Inner Circle with Icon -->

                   :style="getStudentLevelInfo(currentStudent.total).current.level === lvl.level

                           : (getStudentLevelInfo(currentStudent.total).current.level > lvl.level 
                               ? 'background: rgba(16,185,129,0.15); color: #34d399;'

            <!-- Level Details -->

            <div style="font-size: 9px; color: var(--txt-faint); margin-top: 4px;"
                 x-text="lvl.level === 5 ? 'من 800 شعلة فما فوق' : 'من ' + lvl.min + ' إلى ' + lvl.max + ' شعلة'"></div>

            <!-- Status Badge -->
            <div style="margin-top: 10px;">
              <template x-if="getStudentLevelInfo(currentStudent.total).current.level === lvl.level">
                <span style="font-size: 9px; font-weight: 700; background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3); color: #ffb27a; padding: 3px 8px; border-radius: 6px; box-shadow: 0 0 8px rgba(249,115,22,0.1);">رتبتك الحالية</span>

              <template x-if="getStudentLevelInfo(currentStudent.total).current.level > lvl.level">
                <span style="font-size: 9px; color: #34d399; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); padding: 3px 8px; border-radius: 6px;">

                  مكتمل
                </span>
              </template>
            </div>

          </div>
        </template>
      </div>

      <!-- Close Button -->
      <button @click="showLevelsModal = false" 
              class="btn-redeem" style="width:100%; padding:11px; font-size:13px; border-radius:14px;">موافق</button>
      
  </div>

        async startup(silent = false) {
          if (!silent) {

          // Keep the store clock ticking so it opens/closes automatically
          if (!this.storeClockInterval) {
            this.storeNowTs = Date.now();

              this.storeNowTs = Date.now();
            }, 30000);
          }
          
          // Double check initialization
          try {
            if (!supabaseClient && window.supabase) {
              supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
          } catch (e) {
            console.error("Supabase Error during init (client connection):", e);
          }

          if (!supabaseClient) {
            console.warn("Supabase client is not available. Running in LocalStorage fallback mode.");
            this.loadFallbackLocalStorage();
            return;
          }

          try {
            // 1. Fetch Students
            try {
              let { data: dbStudents, error: fetchErr } = await supabaseClient.from('students').select('*');
              if (fetchErr) {
                console.error("Supabase Error during init (fetching students):", fetchErr);
                this.students = DEFAULT_STUDENTS;
              } else {
                if (!dbStudents || dbStudents.length === 0) {
                  // Seeding (only if default students array has items)
                  if (DEFAULT_STUDENTS.length > 0) {
                    const dbDefault = DEFAULT_STUDENTS.map(s => this.mapStudentToDB(s));
                    const { error: seedErr } = await supabaseClient.from('students').insert(dbDefault);
                    if (seedErr) {
                      console.error("Supabase Error during init (seeding students):", seedErr);
                      this.students = DEFAULT_STUDENTS;
                    } else {
                      let { data: reFetched } = await supabaseClient.from('students').select('*');
                      this.students = reFetched && reFetched.length > 0 
                        ? reFetched.map(s => this.mapStudentFromDB(s)) 
                        : DEFAULT_STUDENTS;
                    }
                  } else {
                    this.students = [];
                  }
                } else {
                  this.students = dbStudents.map(s => this.mapStudentFromDB(s));
                }
              }
            } catch (err) {
              console.error("Supabase Error during init (students block exception):", err);
              this.students = DEFAULT_STUDENTS;
            }

            // 2. Fetch Logs
            try {
              let { data: dbLogs, error: logErr } = await supabaseClient.from('activity_log').select('*');
              if (logErr) {
                console.error("Supabase Error during init (fetching logs):", logErr);
              }

              console.error("Supabase Error during init (logs block exception):", err);

              if (invErr) {
                console.error("Supabase Error during init (fetching inventory):", invErr);
              }
              this.inventoryList = (dbInv || []).map(item => ({
                ...item,
                desc: item.desc_text || item.desc || ''
              }));
            } catch (err) {
              console.error("Supabase Error during init (inventory block exception):", err);
              this.inventoryList = [];
            }

            // 4. Fetch Challenge Timer & Configurations
            try {
              let { data: chRows, error: chErr } = await supabaseClient.from('weekly_challenge').select('*');
              if (chErr) {
                console.error("Supabase Error during init (fetching weekly_challenge rows):", chErr);
              } else {
                // Find Timer (ID: 1)
                let chData = chRows ? chRows.find(r => parseInt(r.id) === 1) : null;
                if (!chData) {
                  // Seed challenge timer if missing
                  const defaultCh = {
                    id: 1,
                    title: 'معركة الكلمات السريعة',
                    desc_text: 'فريقان، كلمة واحدة كل دور، والأسرع في بناء جملة مفيدة بلا تكرار يكسب الشعلة.',

                    duration: 600,
                    time_left: 600,
                    is_running: false
                  };
                  await supabaseClient.from('weekly_challenge').insert(defaultCh);
                  this.weeklyChallenge.title = defaultCh.title;
                  this.weeklyChallenge.desc = defaultCh.desc_text;
                  this.weeklyChallenge.points = defaultCh.points;
                  this.weeklyChallenge.duration = defaultCh.duration;
                  this.weeklyChallenge.time_left = defaultCh.time_left;
                  this.weeklyChallenge.is_running = defaultCh.is_running;
                  this.weeklyChallenge.timeLeft = defaultCh.time_left;
                } else {
                  this.weeklyChallenge.title = chData.title;
                  this.weeklyChallenge.desc = chData.desc_text || chData.desc || '';
                  this.weeklyChallenge.points = chData.points;
                  this.weeklyChallenge.duration = chData.duration;
                  this.weeklyChallenge.time_left = chData.time_left;
                  this.weeklyChallenge.is_running = chData.is_running;

                  try {
                    this.rewards = JSON.parse(rewardsData.desc_text);
                  } catch (e) {
                    console.error("Failed to parse rewards config:", e);
                  }
                } else {
                  // Seed rewards config if missing
                  await supabaseClient.from('weekly_challenge').upsert({
                    id: 100,
                    title: 'rewards_config',
                    desc_text: JSON.stringify(this.rewards),
                    points: 0,
                    duration: 0,

                  await supabaseClient.from('weekly_challenge').upsert({

                    duration: 0,

                // Find Push Subscriptions Config (ID: 104)

                  } catch (e) {
                    console.error("Failed to parse push subscriptions config:", e);

                } else {
                  this.pushSubscriptions = [];
                  await supabaseClient.from('weekly_challenge').upsert({
                    id: 104,
                    title: 'push_subscriptions_config',
                    desc_text: JSON.stringify(this.pushSubscriptions),
                    points: 0,
                    duration: 0,
                    time_left: 0
                  });
                }

                // Find Worker URL Config (ID: 105)
                let workerUrlData = chRows ? chRows.find(r => parseInt(r.id) === 105) : null;
                if (workerUrlData && workerUrlData.desc_text) {
                  this.workerUrl = workerUrlData.desc_text;
                  localStorage.setItem('seraj_pwa_worker_url', workerUrlData.desc_text);
                }

                // Find Games Scores Config (ID: 300)
                let scoresData = chRows ? chRows.find(r => parseInt(r.id) === 300) : null;
                if (scoresData && scoresData.desc_text) {
                  try {
                    this.gamesScores = JSON.parse(scoresData.desc_text);
                  } catch (e) {
                    console.error("Failed to parse games scores config:", e);
                    this.gamesScores = {};
                  }
                } else {
                  this.gamesScores = {};
                }

                // تحميل التسليمات من جدول weekly_submissions المخصص
                const { data: wsubRows } = await supabaseClient.from('weekly_submissions').select('*');
                const _subs = {};
                if (wsubRows) {
                  for (const row of wsubRows) {
                    const key = row.student_id + '_w' + row.week;
                    _subs[key] = {
                      studentId: row.student_id,
                      studentName: row.student_name,
                      week: row.week,
                      answers: row.answers || [],

                      ...(row.evaluation ? { evaluation: row.evaluation } : {}),
                      _dbId: row.id
                    };
                  }

                this.weeklySubmissions = _subs;

            const lastSeenVersion = localStorage.getItem('seraj_pwa_version');
            if (lastSeenVersion !== this.version) {

              localStorage.setItem('seraj_pwa_version', this.version);
            }

            // Trigger notification prompt modal if user is logged in and hasn't dismissed/granted yet
            const dismissed = localStorage.getItem('seraj_notif_prompt_dismissed') === 'true';

            if (this.isLoggedIn && !dismissed && !granted) {

              // Pull to refresh implementation

              let refreshStartX = 0;

              window.addEventListener('touchstart', (e) => {
                const scrollEl = document.getElementById('scroll');
                if (scrollEl && scrollEl.scrollTop === 0) {
                  refreshStartY = e.touches[0].pageY;
                  refreshStartX = e.touches[0].pageX;
                }
              }, { passive: true });

              window.addEventListener('touchmove', async (e) => {
                if (refreshStartY === 0 || this.isRefreshing) return;
                const y = e.touches[0].pageY;
                const x = e.touches[0].pageX;
                const diffY = y - refreshStartY;
                const diffX = x - refreshStartX;
                
                if (diffY > 150 && diffY > Math.abs(diffX) * 2) {
                  refreshStartY = 0;
                  try {
                    await this.startup(true);
                    this.showToast('تم تحديث البيانات بنجاح', 'success', 'check');

              }, { passive: true });

              let touchStartX = 0;

              window.addEventListener('touchstart', (e) => {

                  e.target.closest('.stage-toggle') ||
                  e.target.closest('.wc')
                ) {
                  return;
                }
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
              }, { passive: true });
              
              window.addEventListener('touchend', (e) => {
                const ignoreTags = ['input', 'textarea', 'select', 'button', 'a'];
                const targetTag = e.target.tagName.toLowerCase();
                if (
                  ignoreTags.includes(targetTag) ||
                  e.target.closest('.badge-strip') ||
                  e.target.closest('.admin-bar') ||
                  e.target.closest('.modal-card') ||
                  e.target.closest('.stage-toggle') ||
                  e.target.closest('.wc')
                ) {
                  return;
                }
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;
                
                if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
                  // Only swipe if the user is logged in
                  if (!this.isLoggedIn) return;
                  
                  const ids = this.navItems
                    .filter(n => n.id !== 'admin' || this.isAdmin)
                    .map(n => n.id);
                    
                  const curIdx = ids.indexOf(this.currentScreen);
                  if (curIdx !== -1) {
                    let newIdx = curIdx;
                    if (diffX < 0) {
                      // Swipe left -> next page
                      newIdx = (curIdx + 1) % ids.length;
                    } else {
                      // Swipe right -> previous page
                      newIdx = (curIdx - 1 + ids.length) % ids.length;
                    }
                    this.go(ids[newIdx]);
                  }
                }
              }, { passive: true });
            }

            this.$nextTick(() => lucide.createIcons());
          }
        },

          this.$watch('isLoggedIn', () => this.$nextTick(() => lucide.createIcons()));
          this.$nextTick(() => lucide.createIcons());
        },

        setupRealtime() {
          try {
            if (!supabaseClient) return;

            // Clean up any existing channel with the same name/topic to avoid duplicate callback error
            try {
              if (supabaseClient.getChannels && typeof supabaseClient.getChannels === 'function') {
                const existingChannels = supabaseClient.getChannels();
                const oldChan = existingChannels.find(c => c.topic === 'realtime:seraj_realtime_channel' || c.name === 'realtime:seraj_realtime_channel');
                if (oldChan) {
                  console.log("Realtime: Removing existing channel from client to prevent duplicate callbacks.");
                  supabaseClient.removeChannel(oldChan);
                }
              }
            } catch (chanErr) {
              console.warn("Realtime: Error checking/removing existing channel:", chanErr);
            }

            if (this.realtimeChannel) {
              console.log("Realtime: Channel already active, skipping duplicate registration.");
              return;
            }

            const realtimeChannel = supabaseClient.channel('seraj_realtime_channel');
            this.realtimeChannel = realtimeChannel;

            realtimeChannel
              // 1. Students changes
              .on('postgres_changes', { event: '*', schema: 'public', table: 'students' }, payload => {
                console.log("Realtime: Students change received:", payload.eventType);
                if (payload.new) {
                  payload.new = this.mapStudentFromDB(payload.new);
                }
                if (payload.eventType === 'INSERT') {
                  if (!this.students.some(s => s.id === payload.new.id)) {
                    this.students.push(payload.new);
                  }
                } else if (payload.eventType === 'DELETE') {
                  this.students = this.students.filter(s => s.id !== payload.old.id);
                } else if (payload.eventType === 'UPDATE') {
                  const idx = this.students.findIndex(s => s.id === payload.new.id);
                  if (idx !== -1) {
                    this.students[idx] = payload.new;
                  }
                }
                this.render();
              })
              // 2. Activity logs changes
              .on('postgres_changes', { event: '*', schema: 'public', table: 'activity_log' }, payload => {
                console.log("Realtime: Activity log change received:", payload.eventType);
                if (payload.eventType === 'INSERT') {
                  if (!this.activityLogs.some(l => l.id === payload.new.id)) {
                    this.activityLogs.push(payload.new);
                  }
                } else if (payload.eventType === 'DELETE') {
                  this.activityLogs = this.activityLogs.filter(l => l.id !== payload.old.id);
                } else if (payload.eventType === 'UPDATE') {
                  const idx = this.activityLogs.findIndex(l => l.id === payload.new.id);
                  if (idx !== -1) this.activityLogs[idx] = payload.new;
                }
              })
              // 3. Inventory changes
              .on('postgres_changes', { event: '*', schema: 'public', table: 'inventory' }, payload => {
                console.log("Realtime: Inventory change received:", payload.eventType);
                if (payload.new) {
                  payload.new.desc = payload.new.desc_text || payload.new.desc || '';
                }
                if (payload.eventType === 'INSERT') {
                  if (!this.inventoryList.some(i => i.id === payload.new.id)) {
                    this.inventoryList.push(payload.new);
                  }
                } else if (payload.eventType === 'DELETE') {
                  this.inventoryList = this.inventoryList.filter(i => i.id !== payload.old.id);
                } else if (payload.eventType === 'UPDATE') {
                  const idx = this.inventoryList.findIndex(i => i.id === payload.new.id);
                  if (idx !== -1) this.inventoryList[idx] = payload.new;
                }
              })
              // 4. Weekly challenge & configuration changes
              .on('postgres_changes', { event: '*', schema: 'public', table: 'weekly_challenge' }, payload => {
                console.log("Realtime: Weekly challenge change received:", payload.eventType, payload.new ? payload.new.id : '');
                if (payload.new) {
                  const id = parseInt(payload.new.id);
                  if (id === 1) {
                    this.weeklyChallenge.title = payload.new.title;
                    this.weeklyChallenge.desc = payload.new.desc_text || payload.new.desc || '';
                    this.weeklyChallenge.points = payload.new.points;
                    this.weeklyChallenge.duration = payload.new.duration;
                    this.weeklyChallenge.time_left = payload.new.time_left;
                    this.weeklyChallenge.is_running = payload.new.is_running;
                    
                    if (payload.new.is_running && payload.new.updated_at) {
                      const updatedTime = new Date(payload.new.updated_at).getTime();
                      const timeLeftSec = payload.new.time_left;
                      this.weeklyChallenge.ends_at = new Date(updatedTime + timeLeftSec * 1000).toISOString();
                      this.startLocalTimer();
                    } else {
                      this.stopLocalTimer();
                      this.weeklyChallenge.is_running = false;
                      this.weeklyChallenge.ends_at = null;
                      this.weeklyChallenge.timeLeft = payload.new.time_left;
                    }
                  } else if (id === 100) {
                    if (payload.new.desc_text) {
                      try {
                        this.rewards = JSON.parse(payload.new.desc_text);
                      } catch (e) {
                        console.error("Realtime failed to parse rewards JSON:", e);
                      }
                    }
                  } else if (id === 101) {
                    if (payload.new.desc_text) {
                      try {
                        this.achievements = JSON.parse(payload.new.desc_text);
                      } catch (e) {
                        console.error("Realtime failed to parse achievements JSON:", e);
                      }
                    }
                  } else if (id === 102) {
                    if (payload.new.desc_text) {
                      try {
                        const latestNotifications = JSON.parse(payload.new.desc_text);
                        if (latestNotifications.length > 0) {
                          const latest = latestNotifications[latestNotifications.length - 1];
                          const alreadyHave = (this.notifications || []).some(n => n && n.id === latest.id);
                          console.log("Realtime: New notification check. alreadyHave:", alreadyHave, "latest:", latest);
                          if (!alreadyHave) {
                            this.triggerDeviceNotification(latest.title, latest.body);
                            this.showToast(latest.title, 'info', 'bell');
                          }
                        }
                        this.notifications = latestNotifications;
                      } catch (e) {
                        console.error("Realtime failed to parse notifications JSON:", e);
                      }
                    }
                  } else if (id === 300) {
                    if (payload.new.desc_text) {
                      try {
                        this.gamesScores = JSON.parse(payload.new.desc_text);
                      } catch (e) {
                        console.error("Realtime failed to parse gamesScores JSON:", e);
                      }
                    }
                  }
                }
              })
              // 4b. Weekly submissions changes (evaluations / published results)
              .on('postgres_changes', { event: '*', schema: 'public', table: 'weekly_submissions' }, payload => {
                console.log("Realtime: Weekly submission change received:", payload.eventType);
                if (payload.eventType === 'DELETE') {
                  if (payload.old) {
                    const key = payload.old.student_id + '_w' + payload.old.week;
                    const updated = { ...this.weeklySubmissions };
                    delete updated[key];
                    this.weeklySubmissions = updated;
                  }
                  return;
                }
                const row = payload.new;
                if (!row) return;
                const key = row.student_id + '_w' + row.week;
                this.weeklySubmissions = {
                  ...this.weeklySubmissions,
                  [key]: {
                    studentId: row.student_id,
                    studentName: row.student_name,
                    week: row.week,
                    answers: row.answers || [],
                    submittedAt: row.submitted_at,
                    ...(row.evaluation ? { evaluation: row.evaluation } : {}),
                    _dbId: row.id
                  }
                };
              })
              // 5. Pending accounts changes
              .on('postgres_changes', { event: '*', schema: 'public', table: 'pending_accounts' }, payload => {
                console.log("Realtime: Pending accounts change received:", payload.eventType);
                if (payload.eventType === 'INSERT') {
                  if (!this.pendingAccounts.some(p => p.id === payload.new.id)) {
                    this.pendingAccounts.push(payload.new);
                  }
                } else if (payload.eventType === 'DELETE') {
                  this.pendingAccounts = this.pendingAccounts.filter(p => p.id !== payload.old.id);
                } else if (payload.eventType === 'UPDATE') {
                  const idx = this.pendingAccounts.findIndex(p => p.id === payload.new.id);
                  if (idx !== -1) this.pendingAccounts[idx] = payload.new;
                }
              })
              .subscribe((status, err) => {
                if (err) {
                  console.error("Realtime Subscription Error:", err);
                } else {
                  console.log("Realtime Channel Status:", status);
                }
              });
          } catch (e) {
            console.error("Error setting up realtime:", e);
          }
        },

        // Auth
        async submitLogin() {
          this.loginErrorMsg = '';
          if (!this.loginInputId.trim() || !this.loginInputPassword.trim()) {
            this.loginErrorMsg = 'يرجى إدخال المعرف والرمز السري.';
            return;
          }

          const idNormalized = this.loginInputId.trim().toLowerCase();

          // 1. Check if admin login
          const admin = ADMIN_ACCOUNTS.find(a => a.id.toLowerCase() === idNormalized);
          if (admin) {
            if (this.loginInputPassword === admin.pin) {
              this.activeId = admin.id;
              this.isLoggedIn = true;
              this.isAdmin = true;
              this.adminUnlocked = true;
              this.loginInputId = '';
              this.loginInputPassword = '';
              this.currentScreen = 'admin';
              this.saveState();
              this.$nextTick(() => lucide.createIcons());

              // Trigger notification prompt after successful login if not dismissed/granted yet
              this.notificationPermission = ('Notification' in window ? Notification.permission : 'unsupported');
              const dismissed = localStorage.getItem('seraj_notif_prompt_dismissed') === 'true';
              const granted = (this.notificationPermission === 'granted');
              if (!dismissed && !granted) {
                setTimeout(() => {
                  this.showNotificationPrompt = true;
                }, 1500);
              } else if (granted) {
                this.subscribeToPushNotifications();
              }
              return;
            } else {
              this.loginErrorMsg = 'الرمز السري للمشرف غير صحيح.';
              return;
            }
          }

          // 2. Check student list
          const student = this.students.find(s => s.id.toLowerCase() === idNormalized);

          if (!student) {
            const pending = this.pendingAccounts.find(p => p.id.toLowerCase() === idNormalized);
            if (pending) {
              this.loginErrorMsg = 'حسابك بانتظار موافقة المشرف.';
            } else {
              this.loginErrorMsg = 'المعرف غير صحيح.';
            }
            return;
          }

          const correctPin = student.pin || '1111';
          if (this.loginInputPassword === correctPin) {
            this.activeId = student.id;
            this.isLoggedIn = true;
            this.isAdmin = false;
            this.adminUnlocked = false;
            this.loginInputId = '';
            this.loginInputPassword = '';
            this.saveState();
            this.$nextTick(() => lucide.createIcons());

            // Trigger notification prompt after successful login if not dismissed/granted yet
            this.notificationPermission = ('Notification' in window ? Notification.permission : 'unsupported');
            const dismissed = localStorage.getItem('seraj_notif_prompt_dismissed') === 'true';
            const granted = (this.notificationPermission === 'granted');
            if (!dismissed && !granted) {
              setTimeout(() => {
                this.showNotificationPrompt = true;
              }, 1500);
            } else if (granted) {
              this.subscribeToPushNotifications();
            }
          } else {
            this.loginErrorMsg = 'الرمز السري غير صحيح.';
          }
        },

        async submitRegister() {
          this.loginErrorMsg = '';
          this.signupSuccessMsg = '';
          
          if (!this.signupName.trim() || !this.signupId.trim() || !this.signupPassword.trim()) {
            this.loginErrorMsg = 'يرجى تعبئة جميع الحقول المطلوبة.';
            return;
          }

          const idNormalized = this.signupId.trim().toLowerCase();

          if (!/^[a-zA-Z0-9_-]+$/.test(idNormalized)) {
            this.loginErrorMsg = 'يجب أن يحتوي المعرف على أحرف وأرقام إنجليزية فقط.';
            return;
          }

          if (this.students.some(s => s.id.toLowerCase() === idNormalized)) {
            this.loginErrorMsg = 'المعرف مستخدم بالفعل.';
            return;
          }

          if (this.pendingAccounts.some(p => p.id.toLowerCase() === idNormalized)) {
            this.loginErrorMsg = 'يوجد طلب تسجيل معلق بهذا المعرف بالفعل.';
            return;
          }

          if (!supabaseClient) {
            this.students.push({
              id: idNormalized,
              name: this.signupName.trim(),
              stage: this.signupStage,
              team: 'none',
              pin: this.signupPassword.trim(),
              wallet: 0,
              total: 0,
              trend: 1,
              avatarIcon: 'user',
              avatarColor: 'orange',
              headline: 'طالب جديد في سراج',
              badges: []
            });
            this.saveState();
            this.signupSuccessMsg = 'تم إنشاء وتنشيط حسابك محلياً بنجاح!';
            this.signupName = '';
            this.signupId = '';
            this.signupPassword = '';
            return;
          }

          const { error } = await supabaseClient.from('pending_accounts').insert({
            id: idNormalized,
            name: this.signupName.trim(),
            password: this.signupPassword.trim(),
            stage: this.signupStage,
            team: 'none'
          });

          if (error) {
            console.error("Error creating registration request:", error);
            this.loginErrorMsg = 'حدث خطأ أثناء إرسال الطلب. يرجى المحاولة لاحقاً.';
            return;
          }

          this.signupSuccessMsg = 'تم تقديم طلبك بنجاح وبانتظار موافقة الإدارة.';
          
          this.signupName = '';
          this.signupId = '';
          this.signupPassword = '';
        },

        async approveAccount(id) {
          const req = this.pendingAccounts.find(p => p.id === id);
          if (!req) return;

          if (!supabaseClient) {
            const reqIdx = this.pendingAccounts.findIndex(p => p.id === id);
            if (reqIdx !== -1) {
              const pendingReq = this.pendingAccounts[reqIdx];
              this.students.push({
                id: pendingReq.id,
                name: pendingReq.name,
                stage: pendingReq.stage,
                team: pendingReq.team || 'none',
                pin: pendingReq.password,
                wallet: 0,
                total: 0,
                trend: 1,
                avatarIcon: 'user',
                avatarColor: 'orange',
                headline: 'طالب جديد في سراج',
                badges: []
              });
              this.pendingAccounts.splice(reqIdx, 1);
            }
            this.saveState();
            this.showToast('تمت موافقة وتنشيط حساب الطالب بنجاح (محلياً)', 'success', 'user-check');
            return;
          }

          const dbStudent = {
            id: req.id,
            name: req.name,
            stage: req.stage,
            team: req.team || 'none',
            pin: req.password,
            wallet: 0,
            total: 0,
            trend: 1,
            avatar_icon: 'user',
            avatar_color: 'orange',
            headline: 'طالب جديد في سراج',
            badges: []
          };

          const { error: insErr } = await supabaseClient.from('students').insert(dbStudent);

          if (insErr) {
            console.error("Error approving account:", insErr);
            this.showToast('فشل تفعيل الحساب', 'neg');
            return;
          }

          // Push locally immediately if not already added by realtime event
          const localStudent = this.mapStudentFromDB(dbStudent);
          if (!this.students.some(s => s.id === req.id)) {
            this.students.push(localStudent);
          }

          await supabaseClient.from('pending_accounts').delete().eq('id', id);
          this.pendingAccounts = this.pendingAccounts.filter(p => p.id !== id);
          this.showToast('تمت موافقة وتنشيط حساب الطالب بنجاح', 'success', 'user-check');
        },

        async deleteStudentAccount(studentId) {
          if (!supabaseClient) {
            this.students = this.students.filter(s => s.id !== studentId);
            this.saveState();
            this.viewOnlyStudentId = null;
            this.showToast('تم حذف الحساب بنجاح (محلياً)', 'success', 'trash-2');
            return;
          }

          try {
            await supabaseClient.from('inventory').delete().eq('student_id', studentId);
            await supabaseClient.from('activity_log').delete().eq('student_id', studentId);
            
            const { error } = await supabaseClient.from('students').delete().eq('id', studentId);
            if (error) {
              console.error("Error deleting student:", error);
              this.showToast('فشل حذف الحساب', 'neg');
              return;
            }

            this.students = this.students.filter(s => s.id !== studentId);
            this.saveState();
            this.viewOnlyStudentId = null;
            this.showToast('تم حذف الحساب بنجاح كاملاً', 'success', 'trash-2');
          } catch (e) {
            console.error("Exception during delete:", e);
            this.showToast('حدث خطأ غير متوقع', 'neg');
          }
        },

        async rejectAccount(id) {
          if (!supabaseClient) {
            const reqIdx = this.pendingAccounts.findIndex(p => p.id === id);
            if (reqIdx !== -1) this.pendingAccounts.splice(reqIdx, 1);
            this.saveState();
            return;
          }
          const { error } = await supabaseClient.from('pending_accounts').delete().eq('id', id);
          if (error) {
            console.error("Error rejecting account:", error);
            return;
          }
          this.showToast('تم رفض وإلغاء طلب إنشاء الحساب', 'neg', 'user-x');
        },

          localStorage.removeItem('seraj_notif_prompt_dismissed');
          this.isLoggedIn = false;
          this.isAdmin = false;
          this.adminUnlocked = false;
          this.currentScreen = 'leaderboard';

          if (student) {

        getStudentLevelInfo(total) {
          const config = [
            { level: 1, min: 0, max: 100, label: 'مبتدئ سراج', icon: 'sprout' },
            { level: 2, min: 100, max: 250, label: 'شعلة نشيطة', icon: 'flame' },
            { level: 3, min: 250, max: 500, label: 'منارة المعرفة', icon: 'book-open' },
            { level: 4, min: 500, max: 800, label: 'فارس سراج', icon: 'shield' },
            { level: 5, min: 800, max: 999999, label: 'سفير سراج', icon: 'crown' }
          ];
          let current = config[0];
          let next = config[1];
          for (let i = 0; i < config.length; i++) {
            if (total >= config[i].min) {
              current = config[i];
              next = config[i + 1] || null;
            }
          }
          let percent = 100;
          let needed = 0;
          if (next) {
            const range = next.min - current.min;
            const progress = total - current.min;
            percent = Math.min(100, Math.max(0, Math.round((progress / range) * 100)));
            needed = next.min - total;
          }
          return { current, next, percent, needed };
        },

        getStageLabel(s) {
          return s === 'high' ? 'ثانوي' : 'متوسط';
        },

        getTeamLabel(t) {
          return t === 'khwarizmi' ? 'الخوارزمي' : 'ابن الهيثم';

          const item = this.navItems.find(n => n.id === this.currentScreen);
          if (!item) return 'لوحة الصدارة';
          if (item.label === 'الصدارة') return 'لوحة الصدارة';
          return {
            profile: 'الملف الشخصي',
            store: 'المتجر المضيء',
            challenge: 'المسابقة والتحدي',
            weekly: 'التحدي الأسبوعي',
            admin: 'غرفة الإدارة'
          }[this.currentScreen] || item.label;

        getSortedStudents() {
          return [...this.students].sort((a, b) => b.total - a.total);
        },

        getPodiumStudents() {
          const list = this.getSortedStudents();
          const top3 = list.slice(0, 3);
          while (top3.length < 3) {
            top3.push({ id: 'dummy', name: '-', total: 0, stage: '-', team: '-', badges: [] });
          }
          return [top3[1], top3[0], top3[2]]; // 2nd, 1st, 3rd layout
        },

        getStudentRank(studentId) {
          const sorted = this.getSortedStudents();
          return sorted.findIndex(s => s.id === studentId) + 1;

        hasBadge(studentId, badgeId) {
          const st = this.getStudentById(studentId);
          return st ? (st.badges || []).includes(badgeId) : false;

        getStudentActivities(studentId) {
          return this.activityLogs
            .filter(log => log.student_id === studentId)
            .sort((a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime())
            .map(log => ({
              id: log.id,
              reason: log.reason,
              delta: log.delta,
              t: this.formatDateTime(log.created_at),
              pos: log.pos
            }));
        },

        formatDateTime(dateStr) {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          if (isNaN(d.getTime())) return '';
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, '0');
          const dd = String(d.getDate()).padStart(2, '0');
          const hh = String(d.getHours()).padStart(2, '0');
          const min = String(d.getMinutes()).padStart(2, '0');
          return `${yyyy}/${mm}/${dd} - ${hh}:${min}`;
        },

          if (!supabaseClient) {

            recipient.total += giftVal;
            this.activityLogs.unshift({
              id: 'log_s_' + Date.now(),
              student_id: sender.id,

              pos: false,

              student_id: recipient.id,
              reason: `هدية شعلات من ${sender.name.split(' ')[0]}`,

              pos: true,

            this.showToast(`تم إرسال هدية بقيمة ${giftVal} شعلة إلى ${recipient.name.split(' ')[0]}!`, 'success', 'gift');

          const { error: senderErr } = await supabaseClient.from('students').update({
            wallet: sender.wallet - giftVal

          if (senderErr) {
            console.error("Error updating sender:", senderErr);

          const { error: recErr } = await supabaseClient.from('students').update({
            wallet: recipient.wallet + giftVal,
            total: recipient.total + giftVal
          }).eq('id', recipient.id);

          if (recErr) {

            return;

          await supabaseClient.from('activity_log').insert([
            {

              reason: `إهداء شعلات إلى ${recipient.name.split(' ')[0]}`,
              delta: -giftVal,
              pos: false
