        getTeamStats() {
          const teams = {};
          this.students.forEach(st => {
            if (!teams[st.team]) {
              teams[st.team] = { totalPoints: 0, count: 0, trendSum: 0 };
            }
            teams[st.team].totalPoints += st.total;
            teams[st.team].count += 1;
            teams[st.team].trendSum += st.trend;
          });

          return Object.keys(teams).map(tName => {
            const avg = teams[tName].count > 0 ? Math.round(teams[tName].totalPoints / teams[tName].count) : 0;
            return {
              name: tName === 'khwarizmi' ? 'الخوارزمي' : 'ابن الهيثم',
              avgPoints: avg,
              memberCount: teams[tName].count,
              trend: teams[tName].trendSum >= 0 ? 1 : -1
            };
          }).sort((a, b) => b.avgPoints - a.avgPoints);
        },

        // Weekly Challenge Methods
        getWeeklyAnswerLimit(qIndex) {
          return this.weeklyAnswerLimits[qIndex] || 300;
        },

        limitWeeklyAnswer(answer, qIndex) {
          const limit = this.getWeeklyAnswerLimit(qIndex);
          return String(answer || '').slice(0, limit);
        },

        goToWeek(week) {
          if (week < 1) week = 1;
          if (week > this.weeklyChallenges.length) week = this.weeklyChallenges.length;
          this.activeWeeklyChallenge = week;
          this.scrollWeeklyToActive(true);
        },

        weeklyNav(dir) {
          this.goToWeek(this.activeWeeklyChallenge + dir);
        },

        scrollWeeklyToActive(smooth) {
          this.$nextTick(() => {
            const vp = this.$refs.wcViewport;
            if (!vp) return;
            const el = vp.querySelector('.wc-slide[data-week="' + this.activeWeeklyChallenge + '"]');
            if (!el) return;
            // Center the active slide via a physical-pixel delta (reliable in RTL,
            // unlike scrollIntoView which does not honor inline-center here).
            const vr = vp.getBoundingClientRect();
            const er = el.getBoundingClientRect();
            const delta = (er.left + er.width / 2) - (vr.left + vr.width / 2);
            vp.scrollBy({ left: delta, behavior: smooth ? 'smooth' : 'auto' });
          });
        },

        // Sync the active challenge with the carousel position after a finger swipe
        syncWeeklyActive() {
          const vp = this.$refs.wcViewport;
          if (!vp) return;
          const vpRect = vp.getBoundingClientRect();
          const vpCenter = vpRect.left + vpRect.width / 2;
          let bestWeek = null, bestDist = Infinity;
          vp.querySelectorAll('.wc-slide').forEach(el => {
            const r = el.getBoundingClientRect();
            const dist = Math.abs((r.left + r.width / 2) - vpCenter);
            if (dist < bestDist) { bestDist = dist; bestWeek = parseInt(el.dataset.week, 10); }
          });
          if (bestWeek && bestWeek !== this.activeWeeklyChallenge) {
            this.activeWeeklyChallenge = bestWeek;
          }
        },

        weeklyAnswersValid() {
          const chObj = this.weeklyChallenges.find(c => c.week === this.activeWeeklyChallenge);
          if (chObj && chObj.questions && chObj.questions.length === 0) {
            return true;
          }
          return this.weeklyFormAnswers.every((answer, index) => {
            const text = String(answer || '').trim();
            return text.length > 0 && text.length <= this.getWeeklyAnswerLimit(index);
          });
        },

        hasWeeklySubmission(week) {
          if (this.isAdmin) return false;
          if (!this.currentStudent) return false;
          const key = this.currentStudent.id + '_w' + week;
          return !!this.weeklySubmissions[key];
        },

        getWeeklyAnswer(week, qIndex) {
          if (!this.currentStudent) return '';
          const key = this.currentStudent.id + '_w' + week;
          const sub = this.weeklySubmissions[key];
          return sub && sub.answers ? (sub.answers[qIndex] || '') : '';
        },

        getStudentWeeklySubmission(studentId, week) {
          const key = studentId + '_w' + week;
          return this.weeklySubmissions[key] || null;
        },

        getStudentWeeklyAnswer(studentId, week, qIndex) {
          const key = studentId + '_w' + week;
          const sub = this.weeklySubmissions[key];
          return sub && sub.answers ? (sub.answers[qIndex] || '') : '';
        },

        getWeekSubmissionsCount(week) {
          let count = 0;
          for (const key in this.weeklySubmissions) {
            if (key.endsWith('_w' + week)) count++;
          }
          return count;
        },

        getWeeklySubmissionKey(studentId, week) {
          return studentId + '_w' + week;
        },

        getWeeklySubmissionsForWeek(week) {
          return Object.values(this.weeklySubmissions || {})
            .filter(sub => sub && parseInt(sub.week) === parseInt(week))
            .sort((a, b) => (a.studentName || '').localeCompare(b.studentName || '', 'ar'));
        },

        // The week's evaluation is "published" once at least one submission is marked published
        isWeekPublished(week) {
          return Object.values(this.weeklySubmissions || {}).some(
            sub => sub && parseInt(sub.week) === parseInt(week) && sub.evaluation && sub.evaluation.status === 'published'
          );
        },

        getWeeklySubmissionFlames(week, studentId) {
          const sub = this.weeklySubmissions[this.getWeeklySubmissionKey(studentId, week)];
          return sub && sub.evaluation && sub.evaluation.flames != null ? sub.evaluation.flames : '';
        },

        setWeeklySubmissionFlames(week, studentId, value) {
          const key = this.getWeeklySubmissionKey(studentId, week);
          const sub = this.weeklySubmissions[key];
          if (!sub) return;
          const cleanValue = value === '' ? '' : Math.max(0, Math.min(999, Math.round(Number(value) || 0)));
          sub.evaluation = { ...(sub.evaluation || {}), flames: cleanValue };
          this.weeklySubmissions = { ...this.weeklySubmissions, [key]: sub };
        },

        // Flames the current student earned in a week (only after publishing)
        getMyWeeklyFlames(week) {
          if (!this.currentStudent) return 0;
          const sub = this.weeklySubmissions[this.getWeeklySubmissionKey(this.currentStudent.id, week)];
          return sub && sub.evaluation && sub.evaluation.status === 'published' ? (sub.evaluation.flames || 0) : 0;
        },

        getMyWeeklyNote(week) {
          if (!this.currentStudent) return '';
          const sub = this.weeklySubmissions[this.getWeeklySubmissionKey(this.currentStudent.id, week)];
          return sub && sub.evaluation && sub.evaluation.status === 'published' ? (sub.evaluation.note || '') : '';
        },

        // Ranked results (all participants + their flames) once published
        getWeeklyResults(week) {
          return Object.values(this.weeklySubmissions || {})
            .filter(sub => sub && parseInt(sub.week) === parseInt(week) && sub.evaluation && sub.evaluation.status === 'published')
            .map(sub => ({ studentId: sub.studentId, studentName: sub.studentName, flames: (sub.evaluation.flames || 0) }))
            .sort((a, b) => (b.flames - a.flames) || (a.studentName || '').localeCompare(b.studentName || '', 'ar'));
        },

        getWeeklySubmissionNote(week, studentId) {
          const sub = this.weeklySubmissions[this.getWeeklySubmissionKey(studentId, week)];
          return sub && sub.evaluation ? (sub.evaluation.note || '') : '';
        },

        setWeeklySubmissionNote(week, studentId, value) {
          const key = this.getWeeklySubmissionKey(studentId, week);
          const sub = this.weeklySubmissions[key];
          if (!sub) return;
          sub.evaluation = { ...(sub.evaluation || {}), note: String(value || '').slice(0, 300) };
          this.weeklySubmissions = { ...this.weeklySubmissions, [key]: sub };
        },

        async persistWeeklySubmissions() {
          if (!supabaseClient) return;
          await Promise.all(
            Object.values(this.weeklySubmissions)
              .filter(sub => sub._dbId)
              .map(sub => supabaseClient.from('weekly_submissions').update({
                evaluation: sub.evaluation || null
              }).eq('id', sub._dbId))
          );
        },

        async saveWeeklyEvaluation(week, studentId) {
          const key = this.getWeeklySubmissionKey(studentId, week);
          const sub = this.weeklySubmissions[key];
          if (!sub) return;
          if (sub.evaluation && sub.evaluation.status === 'published') return;
          sub.evaluation = {
            ...(sub.evaluation || {}),
            status: 'draft',
            updatedAt: new Date().toISOString(),
            updatedBy: this.activeId
          };
          this.weeklySubmissions = { ...this.weeklySubmissions, [key]: sub };
          await this.persistWeeklySubmissions();
          this.showToast('تم حفظ المسودة', 'success', 'check');
        },

        // Award flames to a student silently (no per-student toast) — used on publish
        async awardWeeklyFlames(studentId, delta, reason) {
          const s = this.getStudentById(studentId);
          if (!s || delta <= 0) return;
          if (!supabaseClient) {
            s.wallet += delta;
            s.total += delta;
            this.activityLogs.unshift({
              id: 'log_' + Date.now() + '_' + studentId,
              student_id: studentId,
              reason: reason,
              delta: delta,
              pos: true,
              created_at: new Date().toISOString()
            });
            this.saveState();
            return;
          }
          const { error: sErr } = await supabaseClient.from('students').update({
            wallet: s.wallet + delta,
            total: s.total + delta
          }).eq('id', studentId);
          if (sErr) {
            console.error('Error awarding weekly flames:', sErr);
            return;
          }
          await supabaseClient.from('activity_log').insert({
            student_id: studentId,
            reason: reason,
            delta: delta,
            pos: true
          });
        },

        // Publish the week's evaluation: grant each student their flames, then reveal results
        async publishWeeklyEvaluation(week) {
          const subs = Object.values(this.weeklySubmissions || {})
            .filter(sub => sub && parseInt(sub.week) === parseInt(week));
          if (subs.length === 0) {
            this.showToast('لا توجد تسليمات لتقييمها', 'neg', 'alert-circle');
            return;
          }
          if (this.isWeekPublished(week)) {
            this.showToast('تم تسليم التقييم مسبقاً', 'info', 'check');
            return;
          }
          const ch = this.weeklyChallenges.find(c => c.week === week);
          const title = ch ? ch.title : ('الأسبوع ' + week);
          this.showConfirm(
            'تسليم التقييم',
            `سيتم منح كل طالب عدد الشعلات المحدد له في «${title}»، وإظهار النتائج للجميع. لا يمكن التراجع، هل أنت متأكد؟`,
            async () => {
              const now = new Date().toISOString();
              for (const sub of subs) {
                if (sub.evaluation && sub.evaluation.status === 'published') continue;
                const flames = sub.evaluation && sub.evaluation.flames
                  ? Math.max(0, Math.round(Number(sub.evaluation.flames) || 0)) : 0;
                if (flames > 0) {
                  await this.awardWeeklyFlames(sub.studentId, flames, `تقييم التحدي الأسبوعي (${title})`);
                }
                const key = this.getWeeklySubmissionKey(sub.studentId, week);
                this.weeklySubmissions[key] = {
                  ...this.weeklySubmissions[key],
                  evaluation: {
                    ...(this.weeklySubmissions[key].evaluation || {}),
                    flames: flames,
                    status: 'published',
                    awardedAt: now,
                    awardedBy: this.activeId
                  }
                };
              }
              this.weeklySubmissions = { ...this.weeklySubmissions };
              await this.persistWeeklySubmissions();
              this.showToast('تم تسليم التقييم ومنح الشعلات', 'success', 'check-circle');
            }
          );
        },

        deleteWeeklySubmission(week, studentId) {
          const key = this.getWeeklySubmissionKey(studentId, week);
          const sub = this.weeklySubmissions[key];
          if (!sub) return;
          this.showConfirm(
            'حذف إجابة الطالب',
            `هل تريد حذف إجابة ${sub.studentName || 'هذا الطالب'} من التحدي؟`,
            async () => {
              if (supabaseClient && sub._dbId) {
                const { error } = await supabaseClient.from('weekly_submissions').delete().eq('id', sub._dbId);
                if (error) {
                  this.showToast('فشل الحذف، حاول مجدداً', 'neg', 'alert-circle');
                  return;
                }
              }
              const updated = { ...this.weeklySubmissions };
              delete updated[key];
              this.weeklySubmissions = updated;
              this.showToast('تم حذف إجابة الطالب', 'success', 'trash-2');
            }
          );
        },

        async submitWeeklyChallenge(week) {
          if (this.weeklySubmitting) return;
          if (!this.currentStudent) return;
          
          const chObj = this.weeklyChallenges.find(c => c.week === week);
          let answersToSave = [];
          
          if (chObj && chObj.questions && chObj.questions.length > 0) {
            this.weeklyFormAnswers = this.weeklyFormAnswers.map((answer, index) => this.limitWeeklyAnswer(answer, index));
            if (this.weeklyFormAnswers.some(a => !a.trim())) {
              this.showToast('يرجى الإجابة على جميع الأسئلة', 'neg', 'alert-circle');
              return;
            }
            const tooLongIndex = this.weeklyFormAnswers.findIndex((answer, index) => answer.length > this.getWeeklyAnswerLimit(index));
            if (tooLongIndex !== -1) {
              this.showToast(`إجابة السؤال ${tooLongIndex + 1} تجاوزت الحد المسموح`, 'neg', 'alert-circle');
              return;
            }
            answersToSave = [...this.weeklyFormAnswers];
          }

          this.weeklySubmitting = true;
          const key = this.currentStudent.id + '_w' + week;

          if (this.weeklySubmissions[key]) {
            this.weeklySubmitting = false;
            this.showToast('لقد سلّمت هذا التحدي مسبقاً', 'neg', 'alert-circle');
            return;
          }

          const submission = {
            studentId: this.currentStudent.id,
            studentName: this.currentStudent.name,
            week: week,
            answers: answersToSave,
            submittedAt: new Date().toLocaleString('ar-SA')
          };

          try {
            if (supabaseClient) {
              // تحقق من DB مباشرة (يمنع التسليم المكرر بعد تحديث الصفحة)
              const { data: existing } = await supabaseClient
                .from('weekly_submissions')
                .select('id')
                .eq('student_id', this.currentStudent.id)
                .eq('week', week)
                .maybeSingle();

              if (existing) {
                if (!this.weeklySubmissions[key]) {
                  this.weeklySubmissions = { ...this.weeklySubmissions, [key]: { ...submission, _dbId: existing.id } };
                }
                this.weeklySubmitting = false;
                this.showToast('لقد سلّمت هذا التحدي مسبقاً', 'neg', 'alert-circle');
                return;
              }

              // INSERT - الـ UNIQUE constraint يمنع التكرار على مستوى DB
              const { data: newRow, error: insertErr } = await supabaseClient
                .from('weekly_submissions')
                .insert({
                  student_id: this.currentStudent.id,
                  week: week,
                  student_name: this.currentStudent.name,
                  answers: answersToSave,
                  submitted_at: new Date().toLocaleString('ar-SA')
                })
                .select('id')
                .single();

              if (insertErr) {
                if (insertErr.code === '23505') {
                  this.weeklySubmitting = false;
                  this.showToast('لقد سلّمت هذا التحدي مسبقاً', 'neg', 'alert-circle');
                  return;
                }
                throw insertErr;
              }

              this.weeklySubmissions = { ...this.weeklySubmissions, [key]: { ...submission, _dbId: newRow.id } };
            } else {
              this.weeklySubmissions = { ...this.weeklySubmissions, [key]: submission };
            }
          } catch (e) {
            console.error('Failed to save weekly submission:', e);
            this.weeklySubmitting = false;
            this.showToast('فشل التسليم، تحقق من اتصالك وحاول مجدداً', 'neg', 'alert-circle');
            return;
          }

          this.weeklyFormAnswers = ['', '', ''];
          this.weeklySubmitting = false;
          this.showToast('تم تسليم مشاركتك بنجاح!', 'success', 'check-circle');
        },

        setMode(m) {

        },

        async awardPoints(studentId, delta, reason) {
          const s = this.getStudentById(studentId);
          if (s) {
            if (!supabaseClient) {
              s.wallet += delta;
              s.total += delta;
              this.activityLogs.unshift({
                id: 'log_' + Date.now(),
                student_id: studentId,
                reason: reason,
                delta: delta,
                pos: true,
                created_at: new Date().toISOString()
              });
              this.saveState();
              this.showToast(`تمت إضافة ${delta} شعلة لـ ${s.name.split(' ')[0]}`, 'success', 'plus-circle');
              return;
            }

            const { error: sErr } = await supabaseClient.from('students').update({
              wallet: s.wallet + delta,
              total: s.total + delta
            }).eq('id', studentId);

            if (sErr) {
              console.error("Error awarding points:", sErr);
              return;
            }

            await supabaseClient.from('activity_log').insert({
              student_id: studentId,
              reason: reason,
              delta: delta,
              pos: true
            });

            this.showToast(`تمت إضافة ${delta} شعلة لـ ${s.name.split(' ')[0]}`, 'success', 'plus-circle');
          }
        },

        async deductPoints(studentId, delta, reason) {
          const s = this.getStudentById(studentId);
          if (s) {
            if (!supabaseClient) {
              s.wallet = Math.max(0, s.wallet + delta);
              s.total = Math.max(0, s.total + delta);
              this.activityLogs.unshift({
                id: 'log_' + Date.now(),
                student_id: studentId,
                reason: reason,
                delta: delta,
                pos: false,
                created_at: new Date().toISOString()
              });
              this.saveState();
              this.showToast(`تم خصم ${Math.abs(delta)} شعلة من ${s.name.split(' ')[0]}`, 'neg', 'minus-circle');
              return;
            }

            const { error: sErr } = await supabaseClient.from('students').update({
              wallet: Math.max(0, s.wallet + delta),
              total: Math.max(0, s.total + delta)
            }).eq('id', studentId);

            if (sErr) {
              console.error("Error deducting points:", sErr);
              return;
            }

            await supabaseClient.from('activity_log').insert({
              student_id: studentId,
              reason: reason,
              delta: delta,
              pos: false
            });

            this.showToast(`تم خصم ${Math.abs(delta)} شعلة من ${s.name.split(' ')[0]}`, 'neg', 'minus-circle');
          }
        },

        async submitManualPoints(isPos) {
          const pts = parseInt(this.manualPoints);
          if (isNaN(pts) || pts <= 0) {
            this.showToast('يرجى إدخال عدد شعلات صحيح أكبر من الصفر', 'neg', 'alert-circle');
            return;
          }
          const reason = this.manualReason.trim();
          if (!reason) {
            this.showToast('يرجى كتابة سبب الإضافة أو الخصم', 'neg', 'alert-circle');
            return;
          }

          if (isPos) {
            await this.awardPoints(this.adminActiveStudentId, pts, reason);
          } else {
            await this.deductPoints(this.adminActiveStudentId, -pts, reason);
          }

          // Clear inputs
          this.manualPoints = '';
          this.manualReason = '';
        },

        async toggleStudentBadge(studentId, badgeId) {
          const s = this.getStudentById(studentId);
          if (!s) return;

          let newBadges;
          let added = false;
          if (s.badges.includes(badgeId)) {
            newBadges = s.badges.filter(b => b !== badgeId);
            added = false;
          } else {
            newBadges = [...s.badges, badgeId];
            added = true;
          }

          const badge = this.achievements.find(a => a.id === badgeId);
          const reward = badge ? badge.reward : 0;
          const badgeName = badge ? badge.name : 'وسام';

          if (!supabaseClient) {
            s.badges = newBadges;
            if (added) {
              s.wallet += reward;
              s.total += reward;
              this.activityLogs.unshift({
                id: 'log_' + Date.now(),
                student_id: studentId,
                reason: `منح وسام: ${badgeName}`,
                delta: reward,
                pos: true,
                created_at: new Date().toISOString()
              });
            } else {
              s.wallet = Math.max(0, s.wallet - reward);
              s.total = Math.max(0, s.total - reward);
              this.activityLogs.unshift({
                id: 'log_' + Date.now(),
                student_id: studentId,
                reason: `سحب وسام: ${badgeName}`,
                delta: -reward,
                pos: false,
                created_at: new Date().toISOString()
              });
            }
            this.saveState();
            this.showToast(added ? `تم منح وسام ${badgeName} (+${reward} شعلة)` : `تم سحب وسام ${badgeName} (-${reward} شعلة)`, 'info');
            return;
          }

          const nextWallet = added ? (s.wallet + reward) : Math.max(0, s.wallet - reward);
          const nextTotal = added ? (s.total + reward) : Math.max(0, s.total - reward);

          const { error: sErr } = await supabaseClient.from('students').update({
            badges: newBadges,
            wallet: nextWallet,
            total: nextTotal
          }).eq('id', studentId);

          if (sErr) {
            console.error("Error updating badges:", sErr);
            return;
          }

          // Insert activity log
          await supabaseClient.from('activity_log').insert({
            student_id: studentId,
            reason: added ? `منح وسام: ${badgeName}` : `سحب وسام: ${badgeName}`,
            delta: added ? reward : -reward,
            pos: added
          });

          this.showToast(added ? `تم منح وسام ${badgeName} (+${reward} شعلة)` : `تم سحب وسام ${badgeName} (-${reward} شعلة)`, 'info');
        },

        async toggleChallengeTimer() {
          if (!supabaseClient) {
            if (this.weeklyChallenge.is_running) {
              this.stopLocalTimer();
              this.weeklyChallenge.is_running = false;
            } else {
              if (this.weeklyChallenge.timeLeft <= 0) {
                this.weeklyChallenge.timeLeft = this.weeklyChallenge.duration;
              }
              this.weeklyChallenge.is_running = true;
              this.weeklyChallenge.ends_at = new Date(Date.now() + this.weeklyChallenge.timeLeft * 1000).toISOString();
              this.startLocalTimer();
            }
            this.saveState();
            return;
          }

          if (this.weeklyChallenge.is_running) {
            await supabaseClient.from('weekly_challenge').update({
              is_running: false,
              time_left: this.weeklyChallenge.timeLeft,
              updated_at: new Date().toISOString()
            }).eq('id', 1);
          } else {
            let currentSec = this.weeklyChallenge.timeLeft;
            if (currentSec <= 0) {
              currentSec = this.weeklyChallenge.duration;
            }
            await supabaseClient.from('weekly_challenge').update({
              is_running: true,
              time_left: currentSec,
              updated_at: new Date().toISOString()
            }).eq('id', 1);
          }
        },

        async resetChallengeTimer() {
          if (!supabaseClient) {
            this.stopLocalTimer();
            this.weeklyChallenge.is_running = false;
            this.weeklyChallenge.timeLeft = this.weeklyChallenge.duration;
            this.weeklyChallenge.ends_at = null;
            this.saveState();
            this.showToast('تمت إعادة ضبط المؤقت', 'info');
            return;
          }

          const { error } = await supabaseClient.from('weekly_challenge').update({
            is_running: false,
            time_left: this.weeklyChallenge.duration,
            updated_at: new Date().toISOString()
          }).eq('id', 1);

          if (error) {
            console.error("Error resetting timer:", error);
          } else {
            this.showToast('تمت إعادة ضبط المؤقت', 'info');
          }
        },

        startLocalTimer() {
          if (this.timerIntervalId) clearInterval(this.timerIntervalId);
          this.timerIntervalId = setInterval(() => {
            if (this.weeklyChallenge.is_running && this.weeklyChallenge.ends_at) {
              const diff = Math.max(0, Math.floor((new Date(this.weeklyChallenge.ends_at).getTime() - Date.now()) / 1000));
              this.weeklyChallenge.timeLeft = diff;
              if (diff <= 0) {
                this.weeklyChallenge.is_running = false;
                clearInterval(this.timerIntervalId);
                this.playBeepSound();
                this.showToast('انتهى وقت التحدي الأسبوعي!', 'info');
              }
            }
          }, 1000);
        },

        stopLocalTimer() {
          if (this.timerIntervalId) {
            clearInterval(this.timerIntervalId);
            this.timerIntervalId = null;
          }
        },

        formatChallengeMinutes(timeLeft) {
          return String(Math.floor(timeLeft / 60)).padStart(2, '0');
        },

        formatChallengeSeconds(timeLeft) {
          return String(timeLeft % 60).padStart(2, '0');
        },

        playBeepSound() {
          try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.35);
          } catch(e) {
            console.warn(e);
          }
        },

        async resetAllGameScores() {
          const gameId = this.activeGameId;
          const gameName = this.games.find(g => g.id === gameId)?.title || `اللعبة ${gameId}`;
          if (!confirm(`هل أنت متأكد من تصفير جميع نتائج (${gameName}) للطلاب لبدء تحدٍ جديد؟`)) return;
          
          this.students.forEach(st => {
            if (gameId === 1) {
              st.gameScore = 0;
              st.trend = 0;
            }
            if (!this.gamesScores) this.gamesScores = {};
            if (!this.gamesScores[st.id]) {
              this.gamesScores[st.id] = {};
            }
            this.gamesScores[st.id][gameId] = 0;
          });
          
          this.showToast("جاري تصفير نتائج اللعبة...", "info");
          if (supabaseClient) {
            try {
              if (gameId === 1) {
                const { data, error } = await supabaseClient.from('students').select('id');
                if (!error && data) {
                  const promises = data.map(s => 
                    supabaseClient.from('students').update({ trend: 0 }).eq('id', s.id)
                  );
                  await Promise.all(promises);
                }
              }
              
              const { error: scoresErr } = await supabaseClient.from('weekly_challenge').upsert({
                id: 300,
                title: 'games_scores',
                desc_text: JSON.stringify(this.gamesScores),
                points: 0,
                duration: 0,
                time_left: 0
              });
              
              if (scoresErr) {
                console.error("Error resetting games scores config in DB:", scoresErr);
                this.showToast("فشل تصفير النقاط في قاعدة البيانات", "neg");
              } else {
                this.showToast(`تم تصفير نتائج (${gameName}) بنجاح!`, "success");
              }
            } catch(e) {
              console.error(e);
              this.showToast("حدث خطأ أثناء تصفير النقاط", "neg");
            }
          } else {
            this.saveState();
            this.showToast(`تم تصفير نتائج (${gameName}) محلياً بنجاح!`, "success");
          }
        },

        startGame() {
          const activeGame = this.games.find(g => g.id === this.activeGameId);
          if (activeGame && activeGame.ended && !this.isAdmin) {
            this.showToast('انتهت مدة هذه اللعبة والتحدي مغلق حالياً!', 'neg', 'alert-circle');
            return;
          }
          
          this.gamePlaying = true;
          this.gameScoreCurrent = 0;
          this.gameTimeLeft = 30;
          this.gameTimerStarted = false;

          if (this.activeGameId === 1) {
            const boardW = Math.max(80, window.innerWidth - 40);
            const boardH = Math.max(80, window.innerHeight - 110);
            const minDim = Math.min(boardW, boardH);
            this.flameBtnSize = Math.min(62, Math.max(14, Math.round(minDim * 0.09)));
            this.moveFlame();
            
            // Start timer immediately for Game 1
            this.gameTimerStarted = true;
            this.startTimerInterval();
          } else if (this.activeGameId === 2) {
            this.resetParagraph();
            this.$nextTick(() => {
              if (this.$refs.typeInput) {
                this.$refs.typeInput.focus();
              }
            });
          } else if (this.activeGameId === 3) {
            this.memSequence = [];
            this.memPlayerStep = 0;
            this.memShowingSequence = false;
            this.memActiveTile = null;
            this.memMistake = false;

            // Game 3 has no timer — one mistake ends the round
            this.startMemoryRound();
          }

          // منع التكبير خلال اللعبة (Ctrl+Scroll وCtrl+Plus/Minus/0)
          this._gameNoZoomWheel = (e) => { if (e.ctrlKey || e.metaKey) e.preventDefault(); };
          this._gameNoZoomKey   = (e) => {
            if ((e.ctrlKey || e.metaKey) && ['=','+','-','_','0'].includes(e.key)) e.preventDefault();
          };
          window.addEventListener('wheel',   this._gameNoZoomWheel, { passive: false });
          window.addEventListener('keydown', this._gameNoZoomKey);

          // إذا تغيّر حجم الـ viewport رغماً (مثل pinch على بعض الأجهزة) → أعد حساب الشعلة
          this._gameViewportResize = () => {
            if (this.activeGameId === 1) {
              const bW = Math.max(80, window.innerWidth  - 40);
              const bH = Math.max(80, window.innerHeight - 110);
              this.flameBtnSize = Math.min(62, Math.max(14, Math.round(Math.min(bW, bH) * 0.09)));
            }
          };
          if (window.visualViewport) window.visualViewport.addEventListener('resize', this._gameViewportResize);
        },

        startTimerInterval() {
          if (this.gameIntervalId) clearInterval(this.gameIntervalId);
          this.gameIntervalId = setInterval(() => {
            if (this.gamePlaying && this.gameTimerStarted) {
              this.gameTimeLeft--;
              if (this.gameTimeLeft <= 0) {
                this.endGame();
              }
            }
          }, 1000);
        },

        moveFlame() {
          const topVal = Math.floor(Math.random() * 70) + 15;
          const leftVal = Math.floor(Math.random() * 70) + 15;
          this.flamePos = {
            top: `${topVal}%`,
            left: `${leftVal}%`
          };
          this.gameTargetType = 'flame';
        },

        clickTarget() {
          if (!this.gamePlaying) return;
          this.gameScoreCurrent++;
          this.playGameClickSound();
          this.moveFlame();
        },

        clickFlame() {
          this.clickTarget();
        },

        resetParagraph() {
          this.currentWordIndex = 0;
          this.wordStatus = [];
          this.typeInputWord = '';
          const paragraphs = [
            "هوية المسلم تتمثل في التزامه بالقيم النبيلة والتمسك بالعقيدة الصافية ونشر السلام والمحبة والصدق والأمانة والتعاون وإعمار الأرض بالخير والتعلم المستمر لرفعة الأمة والمجتمع.",
            "المسلم يتميز بأخلاقه الرفيعة وحبه للخير واحترامه للآخرين وسعيه الدائم لنفع الناس وتقديم المساعدة لمن يحتاجها مقتديا بنبينا محمد صلى الله عليه وسلم في كل شؤون حياته.",
            "بناء الشخصية الإسلامية القوية يبدأ من غرس الإيمان والاعتزاز بالهوية الإسلامية والحفاظ على شعائر الدين والتفوق العلمي والعملي للمساهمة في نهضة الوطن وخدمة الإنسانية."
          ];
          const selected = paragraphs[Math.floor(Math.random() * paragraphs.length)];
          this.typeWordList = selected.split(' ');
        },

        checkTypeWord() {
          if (!this.gamePlaying) return;

          // Start the timer on the first typed character for Game 2
          if (!this.gameTimerStarted && this.typeInputWord.length > 0) {
            this.gameTimerStarted = true;
            this.startTimerInterval();
          }

          const typedValue = this.typeInputWord;
          const targetWord = this.typeWordList[this.currentWordIndex];
          if (!targetWord) return;

          // If the typed value matches the target word and is followed by space
          if (typedValue.endsWith(' ')) {
            const typedWord = typedValue.trim();
            if (typedWord === targetWord) {
              this.wordStatus[this.currentWordIndex] = 'correct';
              this.gameScoreCurrent++;
              this.playGameClickSound();
            } else {
              this.wordStatus[this.currentWordIndex] = 'incorrect';
            }
            this.currentWordIndex++;
            this.typeInputWord = '';
            if (this.currentWordIndex >= this.typeWordList.length) {
              this.resetParagraph();
            }
            return;
          }

          // If it's the last word and they typed it exactly correct without a space yet
          if (this.currentWordIndex === this.typeWordList.length - 1 && typedValue.trim() === targetWord) {
            this.wordStatus[this.currentWordIndex] = 'correct';
            this.gameScoreCurrent++;
            this.playGameClickSound();
            this.resetParagraph();
          }
        },

        sleep(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        },

        getMemoryTileStyle(idx) {
          const tile = this.memTiles[idx];
          const active = this.memActiveTile === idx;
          return 'aspect-ratio:1; border-radius:20px; display:grid; place-items:center; outline:none; cursor:' +
                 (this.memShowingSequence ? 'default' : 'pointer') + ';' +
                 'border: 2px solid ' + tile.color + (active ? '' : '55') + ';' +
                 'background: ' + (active ? tile.color : 'rgba(255,255,255,0.04)') + ';' +
                 'box-shadow: ' + (active ? '0 0 25px ' + tile.color : 'none') + ';' +
                 'transition: background .12s ease, box-shadow .12s ease;';
        },

        startMemoryRound() {
          this.memSequence.push(Math.floor(Math.random() * this.memTiles.length));
          this.memPlayerStep = 0;
          this.playMemorySequence();
        },

        async playMemorySequence() {
          this.memShowingSequence = true;
          this.memActiveTile = null;
          await this.sleep(400);
          for (let i = 0; i < this.memSequence.length; i++) {
            if (!this.gamePlaying) return;
            this.memActiveTile = this.memSequence[i];
            await this.sleep(450);
            this.memActiveTile = null;
            await this.sleep(200);
          }
          if (!this.gamePlaying) return;
          this.memShowingSequence = false;
        },

        tapMemoryTile(idx) {
          if (!this.gamePlaying || this.memShowingSequence) return;

          this.memActiveTile = idx;
          setTimeout(() => { if (this.memActiveTile === idx) this.memActiveTile = null; }, 180);

          if (idx === this.memSequence[this.memPlayerStep]) {
            this.playGameClickSound();
            this.memPlayerStep++;
            if (this.memPlayerStep >= this.memSequence.length) {
              this.gameScoreCurrent++;
              if (this.gameScoreCurrent >= this.memMaxScore) {
                this.endGame();
                return;
              }
              this.memShowingSequence = true;
              setTimeout(() => { if (this.gamePlaying) this.startMemoryRound(); }, 550);
            }
          } else {
            this.memMistake = true;
            this.memShowingSequence = true;
            this.endGame();
          }
        },

        async endGame() {
          this.gamePlaying = false;
          if (this.gameIntervalId) {
            clearInterval(this.gameIntervalId);
            this.gameIntervalId = null;
          }

          // أعد السماح بالتكبير بعد انتهاء اللعبة
          if (this._gameNoZoomWheel) { window.removeEventListener('wheel',   this._gameNoZoomWheel); this._gameNoZoomWheel = null; }
          if (this._gameNoZoomKey)   { window.removeEventListener('keydown', this._gameNoZoomKey);   this._gameNoZoomKey   = null; }
          if (this._gameViewportResize && window.visualViewport) {
            window.visualViewport.removeEventListener('resize', this._gameViewportResize);
            this._gameViewportResize = null;
          }

          this.playGameEndSound();
          if (this.activeGameId === 3 && this.gameScoreCurrent >= this.memMaxScore) {
            this.showToast(`وصلت للحد الأقصى! ${this.gameScoreCurrent} شعلة 🎉`, 'success', 'trophy');
          } else if (this.activeGameId === 3 && this.memMistake) {
            this.showToast(`أخطأت بالتسلسل! انتهت الجولة، نقاطك: ${this.gameScoreCurrent}`, 'neg', 'x-circle');
          } else {
            this.showToast(`انتهت اللعبة! نقاطك: ${this.gameScoreCurrent}`, 'info', 'flame');
          }
          this.memMistake = false;

          if (this.isAdmin) {
            this.showToast('انتهت اللعبة للتجربة! لن يتم حفظ النقاط لأنك مشرف 🛡️', 'info', 'shield');
            return;
          }
          
          const st = this.getStudentById(this.activeId);
          if (st) {
            const gameId = this.activeGameId;
            const previousHigh = this.getStudentGameScore(st.id, gameId);
            
            if (this.gameScoreCurrent > previousHigh) {
              const delta = this.gameScoreCurrent - previousHigh;
              
              st.total = (st.total || 0) + delta;
              st.wallet = (st.wallet || 0) + delta;
              
              if (gameId === 1) {
                st.gameScore = this.gameScoreCurrent;
                st.trend = this.gameScoreCurrent;
              }
              
              if (!this.gamesScores) this.gamesScores = {};
              if (!this.gamesScores[st.id]) {
                this.gamesScores[st.id] = {};
              }
              this.gamesScores[st.id][gameId] = this.gameScoreCurrent;
              
              console.log(`[Game] New high for Game ${gameId}: ${this.gameScoreCurrent}, prev: ${previousHigh}, delta: +${delta}, total: ${st.total}, wallet: ${st.wallet}`);
              this.saveState();
              this.showToast(`رقم قياسي جديد! +${delta} شعلة 🏆`, 'success', 'trophy');
              
              if (supabaseClient) {
                try {
                  const studentUpdate = {
                    total: st.total,
                    wallet: st.wallet
                  };
                  if (gameId === 1) {
                    studentUpdate.trend = this.gameScoreCurrent;
                  }
                  const { error: studentErr } = await supabaseClient.from('students').update(studentUpdate).eq('id', st.id);
                  if (studentErr) console.error("Error saving student points:", studentErr);
                  
                  const { error: scoresErr } = await supabaseClient.from('weekly_challenge').upsert({
                    id: 300,
                    title: 'games_scores',
                    desc_text: JSON.stringify(this.gamesScores),
                    points: 0,
                    duration: 0,
                    time_left: 0
                  });
                  if (scoresErr) console.error("Error saving games scores config:", scoresErr);
                } catch(e) {
                  console.error("Exception saving game score:", e);
                }
              }
            } else {
              this.showToast(`لم تتجاوز رقمك القياسي (${previousHigh})`, 'info', 'flame');
            }
          }
        },

        playGameClickSound() {
          try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600 + Math.random() * 200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
          } catch(e) {}
        },

        playGameEndSound() {
          try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.45);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
          } catch(e) {}
        },

        showToast(msg, type = 'pos', icon = 'check') {
          if (this.toastTimeout) clearTimeout(this.toastTimeout);
          this.toast.message = msg;
          this.toast.type = type;
          this.toast.icon = icon;
          this.toast.show = true;
          this.$nextTick(() => lucide.createIcons());
          this.toastTimeout = setTimeout(() => {
            this.toast.show = false;
          }, 3200);
        },

        async exportData() {
          if (!supabaseClient) {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.students));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `seraj_backup_local_${new Date().toISOString().split('T')[0]}.json`);
            dlAnchorElem.click();
            return;
          }

          let { data } = await supabaseClient.from('students').select('*');
          const mappedData = data ? data.map(s => this.mapStudentFromDB(s)) : [];
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(mappedData));
          const dlAnchorElem = document.createElement('a');
          dlAnchorElem.setAttribute("href", dataStr);
          dlAnchorElem.setAttribute("download", `seraj_backup_${new Date().toISOString().split('T')[0]}.json`);
          dlAnchorElem.click();
        },

        async exportCSV() {
          try {
            let studentsToExport = this.students;
            if (supabaseClient) {
              const { data, error } = await supabaseClient.from('students').select('*');
              if (!error && data) {
                studentsToExport = data;
              }
            }

            const headers = ['المعرف', 'الاسم', 'المرحلة', 'محفظة الشعلات', 'الشعلات التراكمية'];
            const rows = studentsToExport.map(s => [
              s.id,
              s.name,
              this.getStageLabel(s.stage),
              s.wallet,
              s.total
            ]);
            
            const csvContent = "\uFEFF" + [
              headers.join(','),
              ...rows.map(row => row.map(val => `"${String(val).replace(/"/g, '""')}"`).join(','))
            ].join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", url);
            dlAnchorElem.setAttribute("download", `seraj_students_${new Date().toISOString().split('T')[0]}.csv`);
            dlAnchorElem.style.visibility = 'hidden';
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click();
            document.body.removeChild(dlAnchorElem);
            
            this.showToast('تم تصدير ملف CSV بنجاح', 'success', 'check');
          } catch (e) {
            console.error("CSV Export failed:", e);
            this.showToast('فشل تصدير ملف CSV', 'neg');
          }
        },

        async importData(event) {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = async (e) => {
            try {
              const imported = JSON.parse(e.target.result);
              if (Array.isArray(imported)) {
                if (!supabaseClient) {
                  this.students = imported;
                  this.saveState();
                  this.showToast('تم استيراد ومزامنة البيانات محلياً', 'success');
                  this.render();
                  return;
                }

                const dbImported = imported.map(s => this.mapStudentToDB(s));
                const { error } = await supabaseClient.from('students').upsert(dbImported);
                if (error) {
                  console.error("Error importing data to Supabase:", error);
                  this.showToast('فشل استيراد البيانات السحابية', 'neg');
                } else {
                  let { data: reFetched } = await supabaseClient.from('students').select('*');
                  this.students = reFetched && reFetched.length > 0 
                    ? reFetched.map(s => this.mapStudentFromDB(s)) 
                    : imported;
                  this.saveState();
                  this.showToast('تم استيراد ومزامنة البيانات بنجاح', 'success');
                  this.render();
                }
              }
            } catch (err) {
              this.showToast('الملف غير صالح', 'neg');
            }
          };
          reader.readAsText(file);
        },

        async subscribeToPushNotifications(options = {}) {
          const manual = !!options.manual;
          const forceRefresh = !!options.forceRefresh;
          if (this.pushLinkBusy) return false;
          this.pushLinkBusy = true;
          this.pushLinkStatusMessage = 'جاري تحديث الربط...';
          try {
            if (!('serviceWorker' in navigator)) {
              this.showToast('المتصفح لا يدعم Service Worker', 'neg');
              this.pushLinkStatusMessage = 'المتصفح لا يدعم الربط';
              return false;
            }
            if (!this.vapidKeys) {
              this.showToast('مفاتيح الإشعارات غير متوفرة بعد', 'neg');
              this.pushLinkStatusMessage = 'مفاتيح الإشعارات غير متوفرة';
              return false;
            }
            if ('Notification' in window && Notification.permission !== 'granted') {
              this.notificationPermission = Notification.permission;
              this.showToast('فعّل إشعارات الجهاز أولاً', 'info', 'bell');
              this.pushLinkStatusMessage = 'بانتظار تفعيل الإشعارات';
              return false;
            }
            
            if (manual) this.showToast('جاري تحديث ربط الجهاز...', 'info');
            const reg = await Promise.race([
              navigator.serviceWorker.ready,
              new Promise((_, reject) => setTimeout(() => reject(new Error('SW timeout - أعد تحميل الصفحة')), 12000))
            ]);

            if (!reg.pushManager) {
              this.showToast('المتصفح لا يدعم PushManager', 'neg');
              this.pushLinkStatusMessage = 'المتصفح لا يدعم Push';
              return false;
            }
            
            let sub = await reg.pushManager.getSubscription();
            const currentKey = this.vapidKeys.publicKey;
            const registeredKey = localStorage.getItem('seraj_push_registered_vapid');
            const previousEndpoint = localStorage.getItem('seraj_push_registered_endpoint');

            let latestSubs = Array.isArray(this.pushSubscriptions) ? [...this.pushSubscriptions] : [];
            if (supabaseClient) {
              const { data } = await supabaseClient.from('weekly_challenge').select('*').eq('id', 104).single();
              if (data && data.desc_text) {
                try {
                  const parsed = JSON.parse(data.desc_text);
                  latestSubs = Array.isArray(parsed) ? parsed : [];
                } catch(e) {
                  console.error("Failed to parse latest push subscriptions:", e);
                }
              }
            }
            
            // Check if current subscription endpoint is already in the loaded database list
            const isSubscribedInDb = sub && latestSubs.some(s => s && s.subscription && s.subscription.endpoint === sub.endpoint && s.student_id === this.activeId);
            
            if (sub && registeredKey === currentKey && isSubscribedInDb && !forceRefresh) {
              console.log("Push notification subscription is already up-to-date and registered in the database.");
              this.pushSubscriptions = latestSubs;
              this.pushLinkStatusMessage = 'ربط الجهاز محدث بالفعل';
              if (manual) this.showToast('ربط الجهاز محدث بالفعل', 'success', 'check');
              return true;
            }
            
            // If the browser has a valid subscription with correct keys, but it's just missing from the database, reuse it
            const needNewSubscription = !sub || registeredKey !== currentKey;
            
            if (needNewSubscription) {
              if (sub) {
                try {
                  await sub.unsubscribe();
                } catch (e) {
                  console.warn("Failed to unsubscribe existing subscription:", e);
                }
                sub = null;
              }
              
              this.showToast('جاري إنشاء اشتراك إشعارات جديد للجهاز...', 'info');
              const pubKeyUint8 = this.urlBase64ToUint8Array(currentKey);
              sub = await reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: pubKeyUint8
              });
            }
            
            if (sub && this.isLoggedIn && this.activeId) {
              const subObj = JSON.parse(JSON.stringify(sub));
              let deviceId = localStorage.getItem('seraj_push_device_id');
              if (!deviceId) {
                deviceId = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : ('device_' + Date.now() + '_' + Math.random().toString(36).slice(2));
                localStorage.setItem('seraj_push_device_id', deviceId);
              }
              const entry = {
                device_id: deviceId,
                student_id: this.activeId,
                isAdmin: this.isAdmin,
                subscription: subObj,
                updated_at: new Date().toISOString()
              };
              
              let subs = latestSubs.filter(s => s && s.subscription && s.subscription.endpoint);
              
              subs = subs.filter(s => {
                const endpoint = s.subscription.endpoint;
                return endpoint !== subObj.endpoint && (!previousEndpoint || endpoint !== previousEndpoint);
              });
              subs.push(entry);
              this.pushSubscriptions = subs;
              
              let upsertErr = null;
              if (supabaseClient) {
                const { error } = await supabaseClient.from('weekly_challenge').upsert({
                  id: 104,
                  title: 'push_subscriptions_config',
                  desc_text: JSON.stringify(subs),
                  points: 0,
                  duration: 0,
                  time_left: 0
                });
                upsertErr = error;
              } else {
                this.saveState();
              }
              
              if (upsertErr) {
                this.showToast('فشل الحفظ في قاعدة البيانات: ' + upsertErr.message, 'neg');
                this.pushLinkStatusMessage = 'فشل تحديث الربط';
                return false;
              } else {
                console.log("Push subscription saved successfully!");
                localStorage.setItem('seraj_push_registered_vapid', currentKey);
                localStorage.setItem('seraj_push_registered_endpoint', subObj.endpoint);
                this.pushLinkStatusMessage = forceRefresh ? 'تم تحديث الربط الآن' : 'تم ربط الجهاز بنجاح';
                this.showToast(forceRefresh ? 'تم تحديث ربط الجهاز بنجاح' : 'تم ربط الجهاز بقاعدة البيانات بنجاح!', 'pos', 'check');
                setTimeout(() => {
                  if (this.pushLinkStatusMessage === 'تم تحديث الربط الآن' || this.pushLinkStatusMessage === 'تم ربط الجهاز بنجاح') {
                    this.pushLinkStatusMessage = '';
                  }
                }, 3500);
                return true;
              }
            } else {
              this.showToast('لم يتم الحفظ: activeId غير متوفر أو غير مسجل دخول', 'neg');
              this.pushLinkStatusMessage = 'سجّل الدخول أولاً';
              return false;
            }
          } catch(err) {
            console.error("Failed to subscribe to push notifications:", err);
            this.showToast('فشل تفعيل إشعارات الخلفية: ' + err.message, 'neg');
            this.pushLinkStatusMessage = 'فشل تحديث الربط';
            return false;
          } finally {
            this.pushLinkBusy = false;
          }
        },

        urlBase64ToUint8Array(base64String) {
          const padding = '='.repeat((4 - base64String.length % 4) % 4);
          const base64 = (base64String + padding)
            .replace(/\-/g, '+')
            .replace(/_/g, '/');
          const rawData = window.atob(base64);
          const outputArray = new Uint8Array(rawData.length);
          for (let i = 0; i < rawData.length; ++i) {
            outputArray[i] = rawData.charCodeAt(i);
          }
          return outputArray;
        },

            } else {
              try {

              } catch(e) { console.warn(e); }
            }
          }
        },

        checkPushLog() {
          this.pushLogResult = 'جاري الفحص...';
          try {
            const req = indexedDB.open('seraj-push-log', 1);
            req.onsuccess = ev => {
              const db = ev.target.result;
              if (!db.objectStoreNames.contains('logs')) {
                this.pushLogResult = '❌ لا يوجد سجل — لم يصل أي push للـ SW على هذا الجهاز';
                return;
              }
              const tx  = db.transaction('logs', 'readonly');
              const all = tx.objectStore('logs').getAll();
              all.onsuccess = () => {
                const logs = all.result;
                if (!logs || logs.length === 0) {
                  this.pushLogResult = '❌ لم يصل أي push للـ SW على هذا الجهاز بعد';
                } else {
                  const last = logs[logs.length - 1];
                  this.pushLogResult = `✅ آخر push وصل للـ SW: ${last.ts} | data: ${last.raw.slice(0,60)}`;
                }
              };
              all.onerror = () => { this.pushLogResult = '⚠️ خطأ في قراءة السجل'; };
            };
            req.onerror = () => { this.pushLogResult = '❌ لا يوجد سجل push على هذا الجهاز'; };
          } catch(e) { this.pushLogResult = '❌ خطأ: ' + e.message; }
        },

        async sendTestEmptyPush() {
          this.sendingNotif = true;
          this.lastPushResult = { ok: false, msg: '⏳ جاري إرسال push بدون تشفير...' };
          try {
            const workerUrl = this.workerUrl || localStorage.getItem('seraj_pwa_worker_url') || '';
            const { data: subData } = await supabaseClient.from('weekly_challenge').select('*').eq('id', 104).single();
            const subs = subData?.desc_text ? JSON.parse(subData.desc_text) : [];
            const subscriptionsToSend = subs.filter(s => s?.subscription?.endpoint && !s.isAdmin).map(s => s.subscription);
            if (!subscriptionsToSend.length) { this.lastPushResult = { ok: false, msg: '❌ لا أجهزة' }; return; }
            const res = await fetch(workerUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ subscriptions: subscriptionsToSend, title: 'test', body: '', vapidKeys: this.vapidKeys, token: 'seraj_push_token_2026', testNoEncrypt: true })
            });
            const d = await res.json().catch(() => ({}));
            const r = d.results?.[0];
            this.lastPushResult = { ok: d.successes > 0, msg: `🧪 Test Empty: HTTP ${r?.status} | body: ${r?.fcmBody || ''}` };
          } catch(e) {
            this.lastPushResult = { ok: false, msg: '❌ ' + e.message };
          } finally { this.sendingNotif = false; }
        },

        async sendSystemNotification(title, body) {

          const newNotif = {
            id: 'notif_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
            title: title,
            body: body,
            created_at: new Date().toISOString()
          };
          this.notifications.push(newNotif);

          if (supabaseClient) {
            // 1. Save in-app notification to DB
            await supabaseClient.from('weekly_challenge').upsert({
              id: 102,
              title: 'notifications_config',
              desc_text: JSON.stringify(this.notifications),
              points: 0,
              duration: 0,
              time_left: 0
            });

            // 2. Fetch subscriptions and send background push via Cloudflare Worker
            try {
              const workerUrl = this.workerUrl || localStorage.getItem('seraj_pwa_worker_url') || '';
              if (!workerUrl) {
                this.lastPushResult = { ok: false, msg: '❌ رابط خادم الإشعارات (Worker URL) غير موجود' };
                return { saved: true, pushAttempted: false, pushSuccess: false };
              }

              const { data: subData } = await supabaseClient.from('weekly_challenge').select('*').eq('id', 104).single();
              const subs = (subData && subData.desc_text) ? JSON.parse(subData.desc_text) : [];
              const validSubs = Array.isArray(subs)
                ? subs.filter(s => s && s.subscription && s.subscription.endpoint && s.isAdmin !== true)
                : [];
              const seenEndpoints = new Set();
              const subscriptionsToSend = validSubs
                .filter(s => {
                  if (seenEndpoints.has(s.subscription.endpoint)) return false;
                  seenEndpoints.add(s.subscription.endpoint);
                  return true;
                })
                .map(s => s.subscription);

              if (subscriptionsToSend.length === 0) {
                this.lastPushResult = { ok: false, msg: '⚠️ 0 أجهزة مرتبطة — اضغط تحديث ربط الجهاز من الملف الشخصي' };
                return { saved: true, pushAttempted: false, pushSuccess: false };
              }

              this.lastPushResult = { ok: false, msg: `⏳ جاري الإرسال إلى ${subscriptionsToSend.length} جهاز...` };

              const res = await fetch(workerUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  subscriptions: subscriptionsToSend,
                  title,
                  body,
                  message: body,
                  vapidKeys: this.vapidKeys,
                  token: "seraj_push_token_2026"
                })
              });
              const resData = await res.json().catch(() => ({}));
              console.log('[Push] Worker response:', res.status, resData);

              if (!res.ok) {
                this.lastPushResult = { ok: false, msg: `❌ خطأ Worker HTTP ${res.status}: ${resData.error || ''}` };
                return { saved: true, pushAttempted: true, pushSuccess: false };
              }

              // Clean up expired subscriptions (410 Gone / 404 Not Found)
              if (Array.isArray(resData.results)) {
                const expired = new Set();
                resData.results.forEach((r, i) => {
                  if (r.status === 410 || r.status === 404) {
                    const ep = subscriptionsToSend[i]?.endpoint;
                    if (ep) expired.add(ep);
                  }
                });
                if (expired.size) this.removeExpiredSubscriptions(expired);
              }

              if (resData.success) {
                const results = Array.isArray(resData.results) ? resData.results : [];
                const successes = resData.successes ?? results.filter(r => r && r.ok).length;
                const failures  = resData.failures  ?? (results.length - successes);
                const details = results.map((r,i) => `[${i+1}] HTTP ${r.status}`).join(' | ');
                if (failures > 0) {
                  this.lastPushResult = { ok: false, msg: `⚠️ نجح ${successes} وفشل ${failures} — ${details}` };
                } else {
                  this.lastPushResult = { ok: true, msg: `✅ تم إرسال الإشعار إلى ${successes} جهاز بنجاح` };
                }
                this.showToast(this.lastPushResult.msg, this.lastPushResult.ok ? 'pos' : 'info', 'bell');
                return { saved: true, pushAttempted: true, pushSuccess: failures === 0, successes, failures };
              } else {
                this.lastPushResult = { ok: false, msg: '❌ Worker: ' + (resData.error || 'خطأ غير معروف') };
                return { saved: true, pushAttempted: true, pushSuccess: false };
              }
            } catch (err) {
              console.error('[Push] Failed:', err);
              this.lastPushResult = { ok: false, msg: '❌ فشل الاتصال بالخادم: ' + err.message };
              return { saved: true, pushAttempted: true, pushSuccess: false };
            }
          } else {
            this.saveState();
          }
          return { saved: true, pushAttempted: false, pushSuccess: false };
        },

        enterPinDigit(digit) {
          if (this.adminPin.length < 4) {
            this.adminPin += digit;
            if (this.adminPin.length === 4) {
              this.verifyPin();
            }
          }
        },

        deletePinLast() {
          this.adminPin = this.adminPin.slice(0, -1);
          this.pinError = false;
        },

        verifyPin() {
          if (this.adminPin === '0000') {
            this.adminUnlocked = true;
            this.adminPin = '';
            this.showToast('تم إلغاء قفل غرفة الإدارة', 'success', 'lock-open');
          } else {
            this.pinError = true;
            this.pinShake = true;
            setTimeout(() => {
              this.pinShake = false;
              this.adminPin = '';
            }, 500);
          }
        },

        lockAdmin() {
          this.adminUnlocked = false;
          this.adminPin = '';
          this.showToast('تم قفل غرفة الإدارة', 'info', 'lock');
        },
