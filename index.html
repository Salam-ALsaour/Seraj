<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#121414">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <title>سراج</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Alpine.js CDN -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Supabase JS CDN -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  
  <!-- html2pdf.js CDN for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root{
      --bg:#121414;
      --bg2:#0c0e0e;
      --glass:rgba(255,255,255,.03);
      --glass2:rgba(255,255,255,.05);
      --stroke:rgba(255,255,255,.08);
      --stroke2:rgba(255,255,255,.14);
      --emerald:#059669;
      --emerald-glow:rgba(5,150,105,.45);
      --orange:#F97316;
      --orange-glow:rgba(249,115,22,.45);
      --red:#EF4444;
      --red-glow:rgba(239,68,68,.4);
      --txt:#f4f6f6;
      --txt-dim:#8b9494;
      --txt-faint:#5a6363;
      --nav-h:74px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{
      font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;
      background:var(--bg2);
      color:var(--txt);
      -webkit-font-smoothing:antialiased;
      overscroll-behavior:none;
      position:fixed;width:100%;
    }
    
    /* ambient atmosphere */
    #atmos{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    #atmos::before{content:"";position:absolute;top:-15%;right:-25%;width:350px;height:350px;
      background:radial-gradient(circle,var(--orange-glow),transparent 62%);filter:blur(60px);opacity:.35;}
    #atmos::after{content:"";position:absolute;bottom:5%;left:-30%;width:400px;height:400px;
      background:radial-gradient(circle,var(--emerald-glow),transparent 62%);filter:blur(70px);opacity:.28;}

    #app{
      position:relative;
      z-index:1;
      height:100dvh;
      display:flex;
      flex-direction:column;
      max-width:480px;
      margin:0 auto;
      border-left:1px solid var(--stroke);
      border-right:1px solid var(--stroke);
      box-shadow:0 0 50px rgba(0,0,0,0.8);
      background:var(--bg);
    }
    #scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
      padding:calc(env(safe-area-inset-top) + 14px) 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);}
    #scroll::-webkit-scrollbar{display:none;}

    .glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--stroke);border-radius:22px;box-shadow:0 18px 40px -22px rgba(0,0,0,.8);}
    .modal-card{background:rgba(18,20,20,0.96);border:1px solid var(--stroke2);border-radius:24px;box-shadow:0 25px 60px rgba(0,0,0,0.95);color:var(--txt);}
    .card-pane{background:rgba(255,255,255,0.03);border:1px solid var(--stroke);border-radius:16px;}
    .dropdown-card{background:rgba(18,20,20,0.98);border:1px solid var(--stroke2);border-radius:16px;box-shadow:0 20px 40px rgba(0,0,0,0.9);color:var(--txt);}

    /* game challenge card (ألعاب اللقاءات list) */
    .game-card{padding:18px 20px;border-radius:24px;cursor:pointer;transition:border-color .3s ease,box-shadow .3s ease,background .3s ease;position:relative;text-align:right;border:1px solid var(--stroke);}
    .game-card.is-locked{opacity:.6;cursor:not-allowed;}
    .game-card.is-active{border-color:rgba(249,115,22,0.6);background:linear-gradient(135deg,rgba(249,115,22,0.1),rgba(255,255,255,0.02));box-shadow:0 0 15px rgba(249,115,22,0.15);}

    /* header */
    .app-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:0 2px;}
    .brand{display:flex;align-items:center;gap:11px;}
    .brand-mark{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;
      background:#141517;
      border:1.5px solid rgba(249,115,22,0.3);position:relative;}
    .brand-mark::after{content:"";position:absolute;inset:-6px;border-radius:18px;
      background:radial-gradient(circle,var(--orange-glow),transparent 70%);filter:blur(9px);opacity:.7;z-index:-1;}
    .brand-mark svg{width:23px;height:23px;}
    .brand-txt h1{font-size:26px;font-weight:700;letter-spacing:-.3px;line-height:1;}
    .brand-txt span{font-size:11px;color:var(--txt-dim);font-weight:400;}
    .screen-pill{font-size:12px;color:var(--txt-dim);background:var(--glass);border:1px solid var(--stroke);
      padding:7px 13px;border-radius:30px;font-weight:500;}

    .page{animation:fade .35s ease;}
    @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    /* ===== Weekly Challenge Carousel ===== */
    .wc{margin-bottom:14px;}
    .wc-stage{position:relative;}
    .wc-viewport{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;
      padding:6px 4%;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;overscroll-behavior-x:contain;scroll-padding:0 4%;}
    .wc-viewport::-webkit-scrollbar{display:none;}
    .wc-slide{flex:0 0 92%;scroll-snap-align:center;cursor:pointer;
      transform:scale(.94);opacity:.55;transition:transform .35s ease,opacity .35s ease;}
    .wc-slide.is-active{transform:scale(1);opacity:1;cursor:default;}
    .wc-card{position:relative;height:100%;box-sizing:border-box;background:var(--glass);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(249,115,22,0.12);border-radius:22px;padding:18px;
      box-shadow:0 18px 40px -22px rgba(0,0,0,.8);}
    .wc-slide.is-active .wc-card{border-color:rgba(249,115,22,0.45);
      box-shadow:0 0 26px -6px var(--orange-glow);}
    .wc-card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .wc-icon{width:36px;height:36px;border-radius:12px;flex-shrink:0;display:grid;place-items:center;
      background:linear-gradient(135deg,rgba(249,115,22,0.15),transparent);
      border:1px solid rgba(249,115,22,0.2);color:var(--orange);}
    .wc-icon svg{width:20px;height:20px;}
    .wc-title{font-size:14px;font-weight:700;color:var(--txt);}
    .wc-sub{font-size:10px;color:var(--txt-faint);margin-top:2px;}
    .wc-desc{font-size:12px;color:var(--txt-dim);line-height:1.7;text-align:right;}
    .wc-criteria{margin-top:12px;padding:12px;border-radius:12px;text-align:right;
      background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);}
    .wc-criteria-title{font-size:12px;font-weight:800;color:#ffb27a;margin-bottom:6px;}
    .wc-criteria-list{display:grid;gap:5px;font-size:11px;color:var(--txt-dim);line-height:1.6;}
    .wc-badge{margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px;
      padding:8px;border-radius:12px;font-size:11px;font-weight:700;color:#a7f3d0;
      background:rgba(5,150,105,0.12);border:1px solid rgba(5,150,105,0.25);}
    .wc-badge svg{width:14px;height:14px;}
    .wc-badge.wc-badge-ended{color:var(--txt-dim);background:rgba(255,255,255,0.04);border-color:var(--stroke2);}
    /* weekly results (leaderboard-style) */
    .wk-res-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:12px;transition:background .2s;}
    .wk-res-row + .wk-res-row{border-top:1px solid var(--stroke);}
    .wk-res-row.me{background:linear-gradient(135deg,rgba(249,115,22,0.12),rgba(249,115,22,0.02));border:1px solid rgba(249,115,22,0.35);}
    .wk-res-rank{width:24px;flex-shrink:0;text-align:center;font-size:13px;font-weight:800;color:var(--txt-dim);}
    .wk-res-row:nth-child(1) .wk-res-rank{color:#fbbf24;}
    .wk-res-av{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;border:1px solid var(--stroke);}
    .wk-res-name{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--txt);text-align:right;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .wk-res-pts{flex-shrink:0;display:flex;align-items:center;gap:5px;font-size:14px;font-weight:800;color:#ffb27a;}
    .wk-res-pts svg{width:14px;height:14px;}
    .wk-flames-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;color:#ffb27a;background:rgba(249,115,22,0.14);border:1px solid rgba(249,115,22,0.35);padding:4px 9px;border-radius:999px;flex-shrink:0;}
    .wk-flames-badge svg{width:12px;height:12px;}
    /* locked card */
    .wc-card.wc-locked{display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;gap:6px;min-height:170px;border-color:rgba(255,255,255,0.06);
      background:rgba(255,255,255,0.015);}
    .wc-lock-ic{width:40px;height:40px;color:var(--txt-faint);opacity:.55;}
    .wc-lock-ic svg{width:100%;height:100%;}
    .wc-lock-week{font-size:13px;font-weight:700;color:var(--txt-dim);}
    .wc-lock-title{font-size:12px;font-weight:700;color:var(--txt-faint);}
    .wc-lock-sub{font-size:10px;color:var(--txt-faint);opacity:.8;}
    /* arrows */
    .wc-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;
      width:36px;height:36px;border-radius:50%;display:grid;place-items:center;
      background:rgba(18,20,20,0.85);border:1px solid var(--stroke2);color:var(--txt);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;
      box-shadow:0 6px 16px rgba(0,0,0,.5);transition:opacity .2s,transform .15s;}
    .wc-arrow:active{transform:translateY(-50%) scale(.9);}
    .wc-arrow-prev{right:6px;}
    .wc-arrow-next{left:6px;}
    .wc-arrow:disabled{opacity:.25;cursor:not-allowed;}
    .wc-arrow svg{width:20px;height:20px;}
    /* dots */
    .wc-dots{display:flex;justify-content:center;gap:7px;margin-top:12px;}
    .wc-dot{width:7px;height:7px;border-radius:50%;background:var(--stroke2);
      border:none;padding:0;cursor:pointer;transition:all .25s;}
    .wc-dot.is-active{width:20px;border-radius:4px;background:var(--orange);
      box-shadow:0 0 8px var(--orange-glow);}
    .animate-spin{animation:spin 1s linear infinite;}
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

    .sect-title{font-size:13px;color:var(--txt-dim);font-weight:600;margin:22px 4px 12px;display:flex;align-items:center;gap:7px;}
    .sect-title i{width:15px;height:15px;}

    /* ===== PODIUM ===== */
    .podium-wrap{position:relative;padding:14px 6px 0;margin-bottom:6px;}
    .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;height:210px;}
    .pod{display:flex;flex-direction:column;align-items:center;flex:1;max-width:33%;animation:rise .6s cubic-bezier(.2,.9,.3,1) both;}
    .pod-1{animation-delay:.15s;}.pod-2{animation-delay:.05s;}.pod-3{animation-delay:.1s;}
    @keyframes rise{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
    
    .pod-av{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:21px;
      position:relative;margin-bottom:9px;border:2px solid;color:#fff;}
    .pod-1 .pod-av{width:68px;height:68px;font-size:25px;border-color:var(--orange);
      background:linear-gradient(160deg,rgba(249,115,22,.3),rgba(249,115,22,.05));color:#ffd9b8;}
    .pod-1 .pod-av::after{content:"";position:absolute;inset:-9px;border-radius:50%;
      background:radial-gradient(circle,var(--orange-glow),transparent 68%);filter:blur(11px);z-index:-1;}
    .pod-2 .pod-av,.pod-3 .pod-av{border-color:var(--emerald);
      background:linear-gradient(160deg,rgba(5,150,105,.28),rgba(5,150,105,.04));color:#a7f3d0;}
    .pod-2 .pod-av::after,.pod-3 .pod-av::after{content:"";position:absolute;inset:-7px;border-radius:50%;
      background:radial-gradient(circle,var(--emerald-glow),transparent 68%);filter:blur(9px);z-index:-1;}
    .pod-crown{position:absolute;top:-19px;left:50%;transform:translateX(-50%);color:var(--orange);}
    .pod-crown svg{width:21px;height:21px;filter:drop-shadow(0 0 6px var(--orange-glow));}
    .pod-name{font-size:15px;font-weight:600;text-align:center;line-height:1.2;margin-bottom:2px;max-width:96px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .pod-meta{font-size:10px;color:var(--txt-faint);margin-bottom:7px;}
    
    .pod-base{width:100%;border-radius:16px 16px 0 0;display:flex;flex-direction:column;align-items:center;
      justify-content:flex-start;padding-top:13px;border:1px solid var(--stroke);border-bottom:none;
      backdrop-filter:blur(14px);}
    .pod-1 .pod-base{height:118px;background:linear-gradient(180deg,rgba(249,115,22,.16),rgba(249,115,22,.02));
      border-color:rgba(249,115,22,.3);box-shadow:0 0 34px -8px var(--orange-glow);}
    .pod-2 .pod-base{height:90px;background:linear-gradient(180deg,rgba(5,150,105,.13),rgba(5,150,105,.02));border-color:rgba(5,150,105,.25);}
    .pod-3 .pod-base{height:70px;background:linear-gradient(180deg,rgba(5,150,105,.1),rgba(5,150,105,.02));border-color:rgba(5,150,105,.22);}
    
    .pod-rank{font-size:27px;font-weight:700;line-height:1;}
    .pod-1 .pod-rank{color:var(--orange);}.pod-2 .pod-rank,.pod-3 .pod-rank{color:var(--emerald);}
    .pod-pts{font-size:13px;font-weight:600;margin-top:3px;}
    .pod-pts.o{color:#ffd9b8;}.pod-pts.e{color:#a7f3d0;}

    /* toggle switch */
    .toggle{display:flex;background:var(--glass);border:1px solid var(--stroke);border-radius:30px;padding:5px;
      margin:18px 0 16px;position:relative;}
    .toggle-ind{position:absolute;top:5px;bottom:5px;width:calc(50% - 5px);border-radius:26px;
      background:linear-gradient(135deg,rgba(5,150,105,.35),rgba(5,150,105,.15));border:1px solid rgba(5,150,105,.4);
      box-shadow:0 0 20px -4px var(--emerald-glow);transition:transform .32s cubic-bezier(.4,1.2,.4,1);right:5px;}
    .toggle-ind.team{transform:translateX(-100%);}
    .toggle button{flex:1;background:none;border:none;color:var(--txt-dim);font-family:inherit;font-size:14px;
      font-weight:600;padding:11px 0;z-index:1;display:flex;align-items:center;justify-content:center;gap:7px;
      transition:color .3s;cursor:pointer;}
    .toggle button.active{color:var(--txt);}

    /* admin toggle switch */
    .admin-toggle{display:flex;background:var(--glass);border:1px solid var(--stroke);border-radius:30px;padding:5px;
      margin:18px 0 20px;position:relative;}
    .admin-toggle-ind{position:absolute;top:5px;bottom:5px;width:calc(33.333% - 5px);border-radius:26px;
      background:linear-gradient(135deg,rgba(5,150,105,.35),rgba(5,150,105,.15));border:1px solid rgba(5,150,105,.4);
      box-shadow:0 0 20px -4px var(--emerald-glow);transition:transform .32s cubic-bezier(.4,1.2,.4,1);right:5px;}
    .admin-toggle-ind.neg{transform:translateX(-100%);}
    .admin-toggle-ind.ach{transform:translateX(-200%);}
    .admin-toggle button{flex:1;background:none;border:none;color:var(--txt-dim);font-family:inherit;font-size:13px;
      font-weight:600;padding:11px 0;z-index:1;display:flex;align-items:center;justify-content:center;gap:6px;
      transition:color .3s;cursor:pointer;}
    .admin-toggle button.active{color:var(--txt);}
    .admin-toggle button i, .admin-toggle button svg{width:16px;height:16px;}

    /* stage toggle switch */
    .stage-toggle{display:flex;background:var(--glass);border:1px solid var(--stroke);border-radius:30px;padding:5px;
      margin:0 0 16px;position:relative;}
    .stage-toggle-ind{position:absolute;top:5px;bottom:5px;width:calc(33.333% - 5px);border-radius:26px;
      background:linear-gradient(135deg,rgba(249,115,22,.35),rgba(249,115,22,.15));border:1px solid rgba(249,115,22,.4);
      box-shadow:0 0 20px -4px var(--orange-glow);transition:transform .32s cubic-bezier(.4,1.2,.4,1);right:5px;}
    .stage-toggle-ind.mid{transform:translateX(-100%);}
    .stage-toggle-ind.high{transform:translateX(-200%);}
    .stage-toggle button{flex:1;background:none;border:none;color:var(--txt-dim);font-family:inherit;font-size:13px;
      font-weight:600;padding:10px 0;z-index:1;display:flex;align-items:center;justify-content:center;gap:6px;
      transition:color .3s;cursor:pointer;}
    .stage-toggle button.active{color:var(--txt);}
    .stage-toggle button i, .stage-toggle button svg{width:16px;height:16px;}

    /* admin main toggle switch (two tabs) */
    .admin-main-toggle{display:flex;background:var(--glass);border:1px solid var(--stroke);border-radius:30px;padding:5px;
      margin:0 0 20px;position:relative;}
    .admin-main-toggle-ind{position:absolute;top:5px;bottom:5px;width:calc(33.333% - 5px);border-radius:26px;
      background:linear-gradient(135deg,rgba(249,115,22,.35),rgba(249,115,22,.15));border:1px solid rgba(249,115,22,.4);
      box-shadow:0 0 20px -4px var(--orange-glow);transition:transform .32s cubic-bezier(.4,1.2,.4,1);right:5px;}
    .admin-main-toggle-ind.req{transform:translateX(-100%);}
    .admin-main-toggle-ind.notif{transform:translateX(-200%);}
    .admin-main-toggle button{flex:1;background:none;border:none;color:var(--txt-dim);font-family:inherit;font-size:13px;
      font-weight:600;padding:10px 0;z-index:1;display:flex;align-items:center;justify-content:center;gap:6px;
      transition:color .3s;cursor:pointer;}
    .admin-main-toggle button.active{color:var(--txt);}
    .admin-main-toggle button i, .admin-main-toggle button svg{width:16px;height:16px;}

    /* leaderboard rows */
    .lb-row{display:flex;align-items:center;gap:13px;padding:13px 15px;margin-bottom:8px;border-radius:16px;cursor:pointer;transition:border-color .3s ease,box-shadow .3s ease,background .3s ease;}
    .lb-row.is-active{border-color:rgba(249,115,22,0.6);background:linear-gradient(135deg,rgba(249,115,22,0.12),rgba(249,115,22,0.02));box-shadow:0 0 15px rgba(249,115,22,0.2);}
    .lb-rank{width:26px;text-align:center;font-size:16px;font-weight:700;color:var(--txt-faint);flex-shrink:0;}
    .lb-av{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-weight:700;font-size:16px;
      flex-shrink:0;background:linear-gradient(150deg,var(--glass2),transparent);border:1px solid var(--stroke);color:var(--txt);}
    .lb-info{flex:1;min-width:0;}
    .lb-name{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lb-sub{font-size:11px;color:var(--txt-faint);margin-top:2px;display:flex;align-items:center;gap:6px;}
    .lb-tag{padding:1px 7px;border-radius:20px;background:var(--glass2);border:1px solid var(--stroke);font-size:10px;color:var(--txt-dim);}
    
    .lb-pts{text-align:left;flex-shrink:0;}
    .lb-pts-val{font-size:16px;font-weight:700;color:#34d399;text-shadow:0 0 12px var(--emerald-glow);
      display:flex;align-items:center;gap:4px;justify-content:flex-end;}
    .lb-pts-val i{width:13px;height:13px;}
    .arrow-up{color:#34d399;}.arrow-dn{color:var(--red);}
    .lb-pts-lbl{font-size:10px;color:var(--txt-faint);}

    /* ===== PROFILE ===== */
    .prof-hero{display:flex;flex-direction:column;align-items:center;padding:26px 18px 22px;text-align:center;position:relative;overflow:hidden;}
    .prof-ring{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;font-size:34px;font-weight:700;
      background:linear-gradient(160deg,rgba(249,115,22,.25),rgba(5,150,105,.18));border:2px solid var(--stroke2);
      position:relative;margin-bottom:14px;color:#fff;}
    .prof-ring::after{content:"";position:absolute;inset:-11px;border-radius:50%;
      background:radial-gradient(circle,var(--orange-glow),transparent 65%);filter:blur(13px);z-index:-1;opacity:.85;}
    .prof-name{font-size:21px;font-weight:700;}
    .prof-meta{font-size:13px;color:var(--txt-dim);margin-top:5px;display:flex;gap:8px;align-items:center;justify-content:center;}
    .prof-meta .lb-tag{font-size:11px;}
    
    .dual{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:15px;}
    .stat{padding:17px 14px;text-align:center;position:relative;overflow:hidden;}
    .stat-ic{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;margin:0 auto 9px;}
    .stat-ic i{width:18px;height:18px;}
    .stat.wallet .stat-ic{background:rgba(249,115,22,.14);border:1px solid rgba(249,115,22,.3);}
    .stat.wallet .stat-ic i{color:var(--orange);}
    .stat.total .stat-ic{background:rgba(5,150,105,.14);border:1px solid rgba(5,150,105,.3);}
    .stat.total .stat-ic i{color:var(--emerald);}
    .stat-val{font-size:27px;font-weight:700;line-height:1;}
    .stat.wallet .stat-val{color:#ffb27a;text-shadow:0 0 16px var(--orange-glow);}
    .stat.total .stat-val{color:#34d399;text-shadow:0 0 16px var(--emerald-glow);}
    .stat-lbl{font-size:11px;color:var(--txt-dim);margin-top:7px;line-height:1.3;}

    .badge-strip{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 8px;}
    .badge-strip::-webkit-scrollbar{display:none;}
    
    .mini-badge{flex-shrink:0;width:78px;text-align:center;}
    .mini-badge-ic{width:62px;height:62px;border-radius:18px;display:grid;place-items:center;margin:0 auto 7px;position:relative;
      background:var(--glass);border:1px solid var(--stroke);color:var(--txt-faint);}
    .mini-badge-ic i, .mini-badge-ic svg{width:28px;height:28px;}
    .mini-badge.lit .mini-badge-ic{border-color:rgba(249,115,22,.4);background:linear-gradient(160deg,rgba(249,115,22,.18),rgba(5,150,105,.1));color:#ffb27a;}
    .mini-badge.lit .mini-badge-ic::after{content:"";position:absolute;inset:-6px;border-radius:22px;
      background:radial-gradient(circle,var(--orange-glow),transparent 68%);filter:blur(9px);z-index:-1;opacity:.7;}
    .mini-badge-lbl{font-size:10px;color:var(--txt-dim);line-height:1.25;}
    
    .empty-note{font-size:12px;color:var(--txt-faint);text-align:center;padding:20px;}

    .log-item{display:flex;align-items:center;gap:12px;padding:12px 15px;border-bottom:1px solid var(--stroke);}
    .log-item:last-child{border-bottom:none;}
    .log-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;}
    .log-ic i{width:16px;height:16px;}
    .log-ic.pos{background:rgba(5,150,105,.14);border:1px solid rgba(5,150,105,.3);color:var(--emerald);}
    .log-ic.neg{background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.3);color:var(--red);}
    .log-info{flex:1;min-width:0;}
    .log-reason{font-size:14px;font-weight:500;}
    .log-time{font-size:11px;color:var(--txt-faint);margin-top:2px;}
    .log-delta{font-size:15px;font-weight:700;flex-shrink:0;}
    .log-delta.pos{color:#34d399;}.log-delta.neg{color:var(--red);}

    /* ===== STORE ===== */
    .store-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
    .reward{padding:17px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;}
    .reward-ic{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;margin-bottom:12px;position:relative;
      background:linear-gradient(160deg,rgba(249,115,22,.16),rgba(249,115,22,.03));border:1px solid rgba(249,115,22,.25);}
    .reward-ic::after{content:"";position:absolute;inset:-5px;border-radius:20px;
      background:radial-gradient(circle,var(--orange-glow),transparent 70%);filter:blur(8px);z-index:-1;opacity:.6;}
    .reward-ic i{width:26px;height:26px;color:#ffb27a;}
    .reward-name{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:4px;min-height:36px;display:flex;align-items:center;justify-content:center;}
    .reward-desc{font-size:11px;color:var(--txt-faint);margin-bottom:13px;line-height:1.3;}
    .reward-price{font-size:18px;font-weight:700;color:#ffb27a;text-shadow:0 0 12px var(--orange-glow);
      display:flex;align-items:center;gap:5px;margin-bottom:12px;}
    .reward-price i{width:15px;height:15px;}
    
    .btn-redeem{width:100%;padding:11px;border-radius:14px;border:1px solid rgba(5,150,105,.4);font-family:inherit;
      font-size:13px;font-weight:600;background:linear-gradient(135deg,rgba(5,150,105,.3),rgba(5,150,105,.12));
      color:#a7f3d0;cursor:pointer;transition:.2s;box-shadow:0 0 18px -6px var(--emerald-glow);}
    .btn-redeem:active{transform:scale(.96);}
    .btn-redeem:disabled{background:var(--glass);border-color:var(--stroke);color:var(--txt-faint);
      box-shadow:none;cursor:not-allowed;}

    /* ===== ACHIEVEMENTS ===== */
    .ach-card{display:flex;gap:15px;padding:17px;margin-bottom:13px;align-items:center;position:relative;overflow:hidden;text-align:right;}
    .ach-ic{width:60px;height:60px;border-radius:18px;display:grid;place-items:center;flex-shrink:0;position:relative;
      background:var(--glass);border:1px solid var(--stroke);}
    .ach-ic i, .ach-ic svg{width:29px;height:29px;color:var(--txt-faint);transition:.4s;}
    
    .ach-card.unlocked .ach-ic{border-color:rgba(249,115,22,.4);
      background:linear-gradient(160deg,rgba(249,115,22,.18),rgba(5,150,105,.1));}
    .ach-card.unlocked .ach-ic::after{content:"";position:absolute;inset:-6px;border-radius:22px;
      background:radial-gradient(circle,var(--orange-glow),transparent 68%);filter:blur(10px);z-index:-1;opacity:.75;}
    .ach-card.unlocked .ach-ic i, .ach-card.unlocked .ach-ic svg{color:#ffb27a;}
    .ach-info{flex:1;min-width:0;}
    .ach-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
    .ach-card:not(.unlocked) .ach-name{color:var(--txt-dim);}
    .ach-lock{width:14px;height:14px;color:var(--txt-faint);}
    .ach-desc{font-size:12px;color:var(--txt-dim);margin-top:5px;line-height:1.4;}
    
    .ach-pts{display:inline-flex;align-items:center;gap:4px;margin-top:9px;font-size:12px;font-weight:600;
      padding:3px 10px;border-radius:20px;background:rgba(5,150,105,.14);border:1px solid rgba(5,150,105,.28);color:#34d399;}
    .ach-card:not(.unlocked) .ach-pts{background:var(--glass);border-color:var(--stroke);color:var(--txt-faint);}

    /* ===== CHALLENGE ===== */
    .chal-card{padding:26px 22px;text-align:center;position:relative;overflow:hidden;margin-top:6px;}
    .chal-eyebrow{font-size:12px;color:var(--orange);font-weight:600;letter-spacing:.5px;margin-bottom:14px;
      display:flex;align-items:center;justify-content:center;gap:7px;}
    .chal-eyebrow i{width:15px;height:15px;}
    .chal-title{font-size:24px;font-weight:700;line-height:1.3;margin-bottom:10px;}
    .chal-sub{font-size:14px;color:var(--txt-dim);line-height:1.5;margin-bottom:24px;}
    
    .timer{display:flex;justify-content:center;gap:10px;margin-bottom:22px;}
    .timer-unit{display:flex;flex-direction:column;align-items:center;}
    .timer-box{width:74px;height:84px;border-radius:18px;display:grid;place-items:center;font-size:38px;font-weight:700;
      background:linear-gradient(180deg,rgba(249,115,22,.14),rgba(249,115,22,.02));border:1px solid rgba(249,115,22,.3);
      color:#ffb27a;text-shadow:0 0 18px var(--orange-glow);position:relative;font-variant-numeric:tabular-nums;}
    .timer-box::after{content:"";position:absolute;inset:-4px;border-radius:22px;
      background:radial-gradient(circle,var(--orange-glow),transparent 72%);filter:blur(11px);z-index:-1;opacity:.5;}
    .timer-lbl{font-size:11px;color:var(--txt-faint);margin-top:8px;}
    .timer-colon{font-size:34px;font-weight:700;color:var(--txt-faint);align-self:center;padding-bottom:24px;}
    
    .chal-prize{display:inline-flex;align-items:center;gap:9px;padding:12px 22px;border-radius:30px;margin-bottom:20px;
      background:linear-gradient(135deg,rgba(5,150,105,.22),rgba(5,150,105,.08));border:1px solid rgba(5,150,105,.35);
      box-shadow:0 0 24px -8px var(--emerald-glow);}
    .chal-prize i{width:20px;height:20px;color:var(--emerald);}
    .chal-prize span{font-size:16px;font-weight:700;color:#34d399;}
    .chal-prize small{font-size:12px;color:var(--txt-dim);font-weight:400;}
    
    .chal-ctrl{display:flex;gap:11px;}
    .chal-btn{flex:1;padding:14px;border-radius:16px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;border:1px solid;}
    .chal-btn:active{transform:scale(.96);}
    .chal-btn i{width:18px;height:18px;}
    .chal-btn.start{background:linear-gradient(135deg,rgba(5,150,105,.3),rgba(5,150,105,.12));
      border-color:rgba(5,150,105,.45);color:#a7f3d0;box-shadow:0 0 20px -6px var(--emerald-glow);}
    .chal-btn.stop{background:linear-gradient(135deg,rgba(239,68,68,.25),rgba(239,68,68,.1));
      border-color:rgba(239,68,68,.4);color:#fca5a5;}
    .chal-btn.reset{flex:0 0 56px;background:var(--glass);border-color:var(--stroke);color:var(--txt-dim);}
    .admin-only-tag{font-size:11px;color:var(--txt-faint);margin-top:16px;display:flex;align-items:center;justify-content:center;gap:6px;}
    .admin-only-tag i{width:13px;height:13px;}

    /* ===== ADMIN ===== */
    .pin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;animation:fade .35s ease;}
    .pin-lock{width:72px;height:72px;border-radius:22px;display:grid;place-items:center;margin-bottom:18px;position:relative;
      background:linear-gradient(160deg,rgba(249,115,22,.18),rgba(5,150,105,.1));border:1px solid var(--stroke2);}
    .pin-lock::after{content:"";position:absolute;inset:-8px;border-radius:26px;
      background:radial-gradient(circle,var(--orange-glow),transparent 68%);filter:blur(12px);z-index:-1;opacity:.6;}
    .pin-lock i{width:34px;height:34px;color:var(--orange);}
    .pin-title{font-size:20px;font-weight:700;margin-bottom:6px;}
    .pin-sub{font-size:13px;color:var(--txt-dim);margin-bottom:26px;}
    .pin-dots{display:flex;gap:14px;margin-bottom:30px;}
    
    .pin-dot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--stroke2);transition:.2s;}
    .pin-dot.filled{background:var(--orange);border-color:var(--orange);box-shadow:0 0 12px var(--orange-glow);}
    .pin-dot.err{background:var(--red);border-color:var(--red);box-shadow:0 0 12px var(--red-glow);}
    
    .pin-pad{display:grid;grid-template-columns:repeat(3,76px);gap:14px;justify-content:center;}
    .pin-key{width:76px;height:76px;border-radius:50%;font-family:inherit;font-size:28px;font-weight:600;color:var(--txt);
      background:var(--glass);border:1px solid var(--stroke);cursor:pointer;transition:.12s;display:grid;place-items:center;}
    .pin-key:active{transform:scale(.92);background:var(--glass2);border-color:var(--stroke2);}
    .pin-key.fn{font-size:20px;color:var(--txt-dim);}
    .pin-key.empty{background:none;border:none;cursor:default;}
    .pin-key i{width:24px;height:24px;}

    /* ===== LOGIN PAGE ===== */
    .login-container{width:100%;max-width:360px;padding:24px;margin:auto;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;box-sizing:border-box;animation:fade .4s ease;}
    .login-logo{width:96px;height:96px;border-radius:24px;display:grid;place-items:center;background:#141517;border:1.5px solid rgba(249,115,22,0.35);position:relative;margin-bottom:16px;}
    .login-logo::after{content:"";position:absolute;inset:-8px;border-radius:24px;background:radial-gradient(circle,var(--orange-glow),transparent 70%);filter:blur(10px);opacity:.8;z-index:-1;}
    .login-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;width:100%;margin-top:24px;}
    .login-card{padding:18px 12px;border-radius:22px;border:1px solid var(--stroke);cursor:pointer;transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);display:flex;flex-direction:column;align-items:center;text-align:center;background:var(--glass);}
    .login-card:hover{background:var(--glass2);border-color:rgba(255,255,255,0.15);transform:translateY(-3px);box-shadow:0 10px 25px -10px rgba(0,0,0,0.5);}
    .login-card:active{transform:scale(0.96);}


    .admin-bar{display:flex;gap:11px;overflow-x:auto;padding:4px 2px 14px;margin-bottom:6px;}
    .admin-bar::-webkit-scrollbar{display:none;}
    
    .admin-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;padding:13px 10px;border-radius:18px;
      background:var(--glass);border:1px solid var(--stroke);cursor:pointer;transition:.2s;min-width:88px;}
    .admin-chip.active{border-color:var(--emerald);background:linear-gradient(160deg,rgba(5,150,105,.18),transparent);
      box-shadow:0 0 22px -6px var(--emerald-glow);}
    .admin-chip-av{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-weight:700;font-size:17px;
      background:linear-gradient(150deg,var(--glass2),transparent);border:1px solid var(--stroke);}
    .admin-chip.active .admin-chip-av{border-color:rgba(5,150,105,.5);color:#a7f3d0;}
    .admin-chip-name{font-size:12px;font-weight:600;white-space:nowrap;}
    .admin-chip-name2{font-size:10px;font-weight:500;white-space:nowrap;color:var(--txt-dim);margin-top:-4px;}
    .admin-chip-pts{font-size:11px;color:var(--txt-faint);}
    .admin-chip.active .admin-chip-pts{color:#34d399;}

    .active-banner{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:16px;
      border-color:rgba(5,150,105,.35) !important;background:linear-gradient(135deg,rgba(5,150,105,.14),transparent) !important;}
    .active-banner .ab-av{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-weight:700;
      background:rgba(5,150,105,.18);border:1px solid rgba(5,150,105,.4);color:#a7f3d0;flex-shrink:0;}
    .active-banner .ab-info{flex:1;}
    .active-banner .ab-name{font-size:15px;font-weight:700;}
    .active-banner .ab-meta{font-size:11px;color:var(--txt-dim);margin-top:2px;}
    .active-banner .ab-pts{text-align:left;}
    .active-banner .ab-pts-val{font-size:18px;font-weight:700;color:#34d399;}
    .active-banner .ab-pts-lbl{font-size:10px;color:var(--txt-faint);}

    /* XP & Level Progress Bar */
    .xp-card{padding:14px 16px;border-radius:20px;margin-bottom:16px;background:rgba(255,255,255,0.01);}
    .xp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .xp-title{font-size:12px;font-weight:700;color:var(--txt);}
    .xp-lbl{font-size:10px;color:var(--txt-dim);}
    .xp-track{height:8px;border-radius:99px;background:rgba(255,255,255,0.05);border:1px solid var(--stroke);overflow:hidden;position:relative;}
    .xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--orange),#ffb27a);
      box-shadow:0 0 10px var(--orange-glow);transition:width .6s cubic-bezier(.4, 0, .2, 1);}

    /* Inventory Grid & Cards */
    .inv-title{font-size:12px;color:var(--txt-dim);font-weight:600;margin:20px 4px 10px;display:flex;align-items:center;gap:6px;}
    .inv-grid{display:grid;grid-template-columns:1fr;gap:10px;}
    .inv-card{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:18px;
      background:rgba(255,255,255,0.01);border:1px solid var(--stroke);transition:all 0.2s;}
    .inv-card-info{display:flex;align-items:center;gap:10px;}
    .inv-card-av{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--glass2);border:1px solid var(--stroke);color:var(--txt-dim);}
    .inv-card-av.active{color:var(--orange);border-color:rgba(249,115,22,0.3);background:rgba(249,115,22,0.05);}
    .inv-card-name{font-size:12px;font-weight:700;color:var(--txt);display:block;}
    .inv-card-desc{font-size:9px;color:var(--txt-faint);display:block;margin-top:2px;}
    .inv-status-tag{font-size:10px;font-weight:600;padding:4px 8px;border-radius:8px;}
    .inv-status-tag.pending{background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.3);color:#fef08a;}
    .inv-status-tag.used{background:rgba(255,255,255,0.03);border:1px solid var(--stroke);color:var(--txt-faint);}
    .inv-use-btn{padding:6px 12px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;
      background:rgba(249,115,22,0.18);border:1px solid rgba(249,115,22,0.4);color:#ffb27a;transition:all 0.2s;}
    .inv-use-btn:hover{background:rgba(249,115,22,0.3);box-shadow:0 0 12px var(--orange-glow);}

    /* Gifting Console */
    .gift-box{padding:14px 16px;border-radius:20px;margin-top:20px;border:1px dashed var(--stroke);background:rgba(255,255,255,0.01);}
    .gift-title{font-size:12px;font-weight:700;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .gift-input-row{display:flex;gap:8px;align-items:center;}
    .gift-input{flex:1;background:var(--bg);border:1px solid var(--stroke);border-radius:12px;color:var(--txt);
      font-size:13px;padding:8px 12px;outline:none;text-align:center;font-weight:700;}
    .gift-input:focus{border-color:rgba(249,115,22,0.5);box-shadow:0 0 8px rgba(249,115,22,0.15);}
    .gift-quick-btn{padding:8px;background:var(--glass2);border:1px solid var(--stroke);border-radius:10px;
      font-size:11px;font-weight:700;color:var(--txt-dim);cursor:pointer;transition:.15s;}
    .gift-quick-btn:hover{border-color:rgba(249,115,22,0.3);color:var(--txt);}
    .gift-send-btn{padding:8px 16px;background:linear-gradient(135deg,var(--orange),#ffb27a);border:none;
      border-radius:12px;font-size:12px;font-weight:700;color:#121414;cursor:pointer;transition:.15s;
      box-shadow:0 4px 15px -4px var(--orange-glow);display:flex;align-items:center;gap:4px;}
    .gift-send-btn:hover{box-shadow:0 4px 20px -2px var(--orange-glow);transform:translateY(-1px);}

    .macro-label{font-size:12px;font-weight:600;margin:16px 4px 10px;display:flex;align-items:center;gap:7px;}
    .macro-label i{width:14px;height:14px;}
    .macro-label.pos{color:#34d399;}.macro-label.neg{color:#fca5a5;}
    
    .macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
    .macro-btn{padding:15px 12px;border-radius:16px;font-family:inherit;cursor:pointer;text-align:right;transition:.15s;border:1px solid;
      display:flex;flex-direction:column;gap:5px;}
    .macro-btn:active{transform:scale(.95);}
    
    .macro-btn.pos{background:linear-gradient(135deg,rgba(5,150,105,.16),rgba(5,150,105,.04));border-color:rgba(5,150,105,.3);
      box-shadow:0 0 16px -8px var(--emerald-glow);}
    .macro-btn.neg{background:linear-gradient(135deg,rgba(239,68,68,.14),rgba(239,68,68,.03));border-color:rgba(239,68,68,.28);}
    
    .macro-btn-top{display:flex;align-items:center;justify-content:space-between;}
    .macro-btn-reason{font-size:13px;font-weight:600;color:var(--txt);}
    .macro-btn-delta{font-size:17px;font-weight:700;}
    .macro-btn.pos .macro-btn-delta{color:#34d399;}.macro-btn.neg .macro-btn-delta{color:#fca5a5;}
    .macro-btn i, .macro-btn svg{width:17px;height:17px;}
    .macro-btn.pos i, .macro-btn.pos svg{color:var(--emerald);}.macro-btn.neg i, .macro-btn.neg svg{color:var(--red);}

    .data-row{display:flex;gap:11px;margin-top:22px;}
    .data-btn{flex:1;padding:14px;border-radius:16px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;background:var(--glass);border:1px solid var(--stroke);
      color:var(--txt-dim);transition:.2s;}
    .data-btn:active{transform:scale(.96);background:var(--glass2);}
    .data-btn i{width:17px;height:17px;}
    
    .admin-logout{width:100%;margin-top:14px;padding:12px;border-radius:14px;background:none;border:1px solid var(--stroke);
      color:var(--txt-faint);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:flex;
      align-items:center;justify-content:center;gap:7px;transition:.2s;}
    .admin-logout:active{background:var(--glass2);}
    .admin-logout i{width:15px;height:15px;}

    /* ===== BOTTOM NAV ===== */
    #nav{position:fixed;bottom:0;left:0;right:0;z-index:50;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom:env(safe-area-inset-bottom);background:rgba(12,14,14,.72);backdrop-filter:blur(28px);
      -webkit-backdrop-filter:blur(28px);border-top:1px solid var(--stroke);display:flex;max-width:480px;margin:0 auto;}
    
    .nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;cursor:pointer;color:var(--txt-faint);transition:.2s;position:relative;padding-top:10px;}
    .nav-btn i{width:23px;height:23px;transition:.2s;}
    .nav-btn span{font-size:10px;font-weight:500;font-family:inherit;}
    .nav-btn.active{color:var(--orange);}
    .nav-btn.active i{filter:drop-shadow(0 0 8px var(--orange-glow));}
    .nav-btn.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:3px;
      border-radius:3px;background:var(--orange);box-shadow:0 0 10px var(--orange-glow);}

    /* toast */
    #toast{position:fixed;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);left:50%;transform:translateX(-50%) translateY(20px);
      z-index:100;padding:13px 20px;border-radius:30px;background:rgba(12,14,14,.9);backdrop-filter:blur(20px);
      border:1px solid var(--stroke2);font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.35s;
      display:flex;align-items:center;gap:9px;max-width:88vw;box-shadow:0 14px 40px -10px rgba(0,0,0,.8);}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #toast i{width:18px;height:18px;flex-shrink:0;}
    #toast.pos{color:#34d399;}#toast.pos i{color:#34d399;}
    #toast.neg{color:#fca5a5;}#toast.neg i{color:var(--red);}
    #toast.info{color:#ffb27a;}#toast.info i{color:var(--orange);}

    /* Keyframes and Animations */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .animate-shake {
      animation: shake 0.2s ease-in-out 0s 2;
    }

    /* Sleek custom scrollbars for dropdowns */
    .glass::-webkit-scrollbar {
      width: 6px;
    }
    .glass::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.01);
      border-radius: 10px;
    }
    .glass::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    .glass::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .chevron-icon {
      width: 16px !important;
      height: 16px !important;
      flex-shrink: 0;
      color: var(--txt-dim);
      transition: transform 0.2s;
    }

    .game-flame-btn {
      position: absolute;
      width: 62px;
      height: 62px;
      padding: 0;
      background: radial-gradient(circle, rgba(249,115,22,0.4) 0%, rgba(249,115,22,0.08) 70%);
      border: 1.5px solid rgba(249,115,22,0.55);
      cursor: pointer;
      transition: top 0.08s ease-out, left 0.08s ease-out;
      display: grid;
      place-items: center;
      border-radius: 50%;
      outline: none;
      box-shadow: 0 0 20px rgba(249,115,22,0.45), 0 0 40px rgba(249,115,22,0.2);
      z-index: 15;
      transform: translate(-50%, -50%);
      animation: flame-glow 1s ease-in-out infinite alternate;
    }
    .game-flame-btn:active {
      transform: translate(-50%, -50%) scale(0.9) !important;
    }
    @keyframes flame-glow {
      0% { box-shadow: 0 0 20px rgba(249,115,22,0.45), 0 0 40px rgba(249,115,22,0.2); }
      100% { box-shadow: 0 0 30px rgba(249,115,22,0.7), 0 0 60px rgba(249,115,22,0.35); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.15); opacity: 0.85; }
    }

    .typing-input {
      width: 100%;
      max-width: 320px;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.08) !important;
      background: rgba(18, 20, 20, 0.8) !important;
      color: #fff !important;
      outline: none !important;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.25) !important;
      font-family: 'Cairo', sans-serif;
      transition: all 0.25s ease !important;
    }
    .typing-input:focus {
      border-color: var(--orange) !important;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4), 0 0 15px rgba(249,115,22,0.3) !important;
      background: rgba(18, 20, 20, 0.9) !important;
    }
    .typing-input::placeholder {
      color: rgba(255, 255, 255, 0.3) !important;
    }
  </style>
</head>
<body>

  <!-- PWA Container -->
  <div id="app" x-data="serajApp()" x-init="startup()">
    
    <!-- Pull-to-refresh spinner (only shows at top of screen without full loading overlay) -->
    <div x-show="isRefreshing" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-4"
         style="position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 1000; background: var(--bg2); border: 1px solid var(--stroke2); padding: 8px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 10px var(--orange-glow); display: flex; align-items: center; justify-content: center; width: 38px; height: 38px;">
      <svg class="animate-spin" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 22px; height: 22px;">
        <line x1="12" y1="2" x2="12" y2="6"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
        <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="6" y2="12"/>
        <line x1="18" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
        <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
      </svg>
    </div>
    
    <!-- Loading Spinner Overlay -->
    <div x-show="isLoading" class="absolute inset-0 bg-[#121414] z-50 flex flex-col items-center justify-center gap-4">
      <div class="w-12 h-12 rounded-full border-4 border-zinc-800 border-t-orange-500 animate-spin"></div>
      <p class="text-xs text-zinc-400 font-bold">جاري مزامنة البيانات السحابية...</p>
    </div>
    
    <!-- Ambient background glow layers (moved inside app) -->
    <div id="atmos"></div>
    
    <!-- 1. 🔑 LOGIN SCREEN (When Not Logged In) -->
    <template x-if="!isLoggedIn">
      <div class="login-container" dir="rtl">
        
        <!-- LOGIN MODE -->
        <template x-if="loginMode === 'login'">
          <div style="width:100%; display:flex; flex-direction:column; align-items:center;">
            
            <div class="login-logo">
              <img src="icon.png" alt="شعار سراج" style="width:72px; height:72px; object-fit:contain;" />
            </div>
            

            <p style="font-size:12px; color:var(--txt-dim); margin-bottom: 24px;">أدخل معرف الطالب وكلمة السر لبدء الرحلة والتنافس</p>
            
            <!-- Login Fields -->
            <div class="glass" style="width: 100%; padding: 24px; border-radius: 24px; display: flex; flex-direction: column; gap: 16px;">
              <div style="text-align: right;">
                <label style="font-size: 11px; color: var(--txt-dim); font-weight: 600; display: block; margin-bottom: 6px;">معرف الطالب</label>
                <input type="text" x-model="loginInputId" placeholder="" 
                       style="width: 100%; background: var(--bg2); border: 1px solid var(--stroke); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--txt); font-family: inherit; outline: none; transition: all 0.2s;"
                       @focus="$el.style.borderColor = 'rgba(249,115,22,0.4)'"
                       @blur="$el.style.borderColor = 'var(--stroke)'" />
              </div>
              
              <div style="text-align: right;">
                <label style="font-size: 11px; color: var(--txt-dim); font-weight: 600; display: block; margin-bottom: 6px;">الرمز السري</label>
                <input type="password" x-model="loginInputPassword" placeholder="" 
                       style="width: 100%; background: var(--bg2); border: 1px solid var(--stroke); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--txt); font-family: inherit; outline: none; transition: all 0.2s;"
                       @focus="$el.style.borderColor = 'rgba(249,115,22,0.4)'"
                       @blur="$el.style.borderColor = 'var(--stroke)'" />
              </div>

              <template x-if="loginErrorMsg">
                <div style="font-size: 11px; color: #f87171; text-align: center; font-weight: 600;" x-text="loginErrorMsg"></div>
              </template>

              <button @click="submitLogin()" 
                      class="btn-redeem"
                      style="width: 100%; padding: 12px; font-size: 13px; font-weight: 700; border-radius: 12px; background: linear-gradient(135deg, var(--orange), #ffb27a); border: none; color: #fff; box-shadow: 0 0 15px var(--orange-glow); cursor: pointer; transition: all 0.2s;">
                تسجيل الدخول
              </button>
            </div>

            <!-- Signup trigger button -->
            <button @click="loginMode = 'register'; loginErrorMsg = ''; signupSuccessMsg = '';" 
                    style="margin-top: 20px; font-size: 12px; color: var(--orange); background: none; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s;">
              إنشاء حساب جديد
            </button>
            
            <div style="margin-top: 30px; font-size: 10px; color: var(--txt-faint);" x-text="'إصدار التطبيق v' + version"></div>
            
            
          </div>
        </template>

        <!-- SIGNUP MODE -->
        <template x-if="loginMode === 'register'">
          <div style="width:100%; display:flex; flex-direction:column; align-items:center;">
            
            <div class="login-logo">
              <!-- User Plus SVG -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:34px; height:34px; color:#f97316;">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <line x1="19" y1="8" x2="19" y2="14" />
                <line x1="22" y1="11" x2="16" y2="11" />
              </svg>
            </div>
            
            <h1 style="font-size:26px; font-weight:700; color:var(--txt); margin-bottom:4px;">إنشاء حساب</h1>
            <p style="font-size:12px; color:var(--txt-dim); margin-bottom: 20px;">املأ البيانات أدناه لتقديم طلب انضمام لسراج</p>
            
            <!-- Signup Fields -->
            <div class="glass" style="width: 100%; padding: 24px; border-radius: 24px; display: flex; flex-direction: column; gap: 14px;">
              
              <!-- Success Message -->
              <template x-if="signupSuccessMsg">
                <div style="font-size: 12px; color: #34d399; text-align: center; font-weight: 600; padding: 8px; background: rgba(52, 211, 153, 0.08); border: 1px solid rgba(52, 211, 153, 0.2); border-radius: 12px;" x-text="signupSuccessMsg"></div>
              </template>

              <template x-if="!signupSuccessMsg">
                <div style="display: flex; flex-direction: column; gap: 14px; width: 100%;">
                  <div style="text-align: right;">
                    <label style="font-size: 11px; color: var(--txt-dim); font-weight: 600; display: block; margin-bottom: 6px;">الاسم الكامل</label>
                    <input type="text" x-model="signupName" placeholder="مثال: يوسف العتيبي" 
                           style="width: 100%; background: var(--bg2); border: 1px solid var(--stroke); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--txt); font-family: inherit; outline: none; transition: all 0.2s;" />
                  </div>

                  <div style="text-align: right;">
                    <label style="font-size: 11px; color: var(--txt-dim); font-weight: 600; display: block; margin-bottom: 6px;">معرف الطالب (ID بالإنجليزية)</label>
                    <input type="text" x-model="signupId" placeholder="مثال: youssef" 
                           style="width: 100%; background: var(--bg2); border: 1px solid var(--stroke); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--txt); font-family: inherit; outline: none; transition: all 0.2s;" />
                  </div>
                  
                  <div style="text-align: right;">
                    <label style="font-size: 11px; color: var(--txt-dim); font-weight: 600; display: block; margin-bottom: 6px;">الرمز السري</label>
                    <input type="password" x-model="signupPassword" placeholder="" 
                           style="width: 100%; background: var(--bg2); border: 1px solid var(--stroke); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--txt); font-family: inherit; outline: none; transition: all 0.2s;" />
                  </div>

                  <div style="display: flex; gap: 12px; width: 100%;">
                    <div style="flex: 1; text-align: right;">
                      <label style="font-size: 11px; color: var(--txt-dim); font-weight: 600; display: block; margin-bottom: 6px;">المرحلة</label>
                      <select x-model="signupStage" 
                              style="width: 100%; background: var(--bg2); border: 1px solid var(--stroke); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--txt); font-family: inherit; outline: none;">
                        <option value="middle" style="background:#121414;">المتوسط</option>
                        <option value="high" style="background:#121414;">الثانوي</option>
                      </select>
                    </div>
                  </div>

                  <template x-if="loginErrorMsg">
                    <div style="font-size: 11px; color: #f87171; text-align: center; font-weight: 600;" x-text="loginErrorMsg"></div>
                  </template>

                  <button @click="submitRegister()" 
                          class="btn-redeem"
                          style="width: 100%; padding: 12px; font-size: 13px; font-weight: 700; border-radius: 12px; background: linear-gradient(135deg, var(--orange), #ffb27a); border: none; color: #fff; box-shadow: 0 0 15px var(--orange-glow); cursor: pointer; transition: all 0.2s;">
                    إرسال طلب إنشاء الحساب
                  </button>
                </div>
              </template>

            </div>

            <!-- Back to Login -->
            <button @click="loginMode = 'login'; loginErrorMsg = ''; signupSuccessMsg = '';" 
                    style="margin-top: 20px; font-size: 12px; color: var(--txt-dim); background: none; border: none; font-weight: 600; cursor: pointer;">
              العودة لتسجيل الدخول
            </button>
            
          </div>
        </template>
        
      </div>
    </template>

    <template x-if="isLoggedIn">
      <div style="display:contents;">
        <div id="scroll" :style="gamePlaying ? 'overflow-y: hidden !important;' : ''">
      <!-- HEADER -->
      <div class="app-head">
        <div class="brand">
          <div class="brand-mark">
            <img src="icon.png" alt="شعار سراج" style="width:36px; height:36px; object-fit:contain;" />
          </div>
          <div class="brand-txt">
            <h1>سراج</h1>
          </div>
        </div>

        <!-- Header Profile Widget (Top Left) -->
        <template x-if="isAdmin || currentStudent">
          <div @click="isAdmin ? adminMenuOpen = true : go('profile')" 
               style="cursor:pointer; display:flex; align-items:center; gap:8px; padding:6px 12px; border-radius:18px; background:var(--glass); border:1px solid var(--stroke); transition:all 0.2s;"
               @mouseenter="$el.style.background = 'var(--glass2)'; $el.style.borderColor = 'rgba(255,255,255,0.15)'"
               @mouseleave="$el.style.background = 'var(--glass)'; $el.style.borderColor = 'var(--stroke)'">
            
            <!-- Avatar Badge (Student/Admin) -->
            <div style="width:28px; height:28px; border-radius:50%; display:grid; place-items:center; border:1.5px solid; position:relative;"
                 :style="isAdmin ? {
                   'border-color': '#ef4444',
                   'background': 'radial-gradient(circle, rgba(239,68,68,0.15) 10%, rgba(12,14,14,0.85) 90%)',
                   'color': '#fca5a5',
                   'box-shadow': '0 0 10px rgba(239,68,68,0.3)'
                 } : {
                   'border-color': avatarColorMap[currentStudent.avatarColor || 'orange'],
                   'background': 'linear-gradient(160deg,' + avatarColorGlowMap[currentStudent.avatarColor || 'orange'] + ',rgba(12,14,14,0.6))',
                   'color': avatarColorLightMap[currentStudent.avatarColor || 'orange'],
                   'box-shadow': '0 0 10px ' + avatarColorGlowMap[currentStudent.avatarColor || 'orange']
                 }">
              <div style="width:13px; height:13px;" x-html="isAdmin ? getIconSvg('shield') : getIconSvg(currentStudent.avatarIcon || 'user')"></div>
              
              <!-- Level Badge (only for students) -->
              <template x-if="!isAdmin && currentStudent">
                <div style="position:absolute; bottom:-3px; right:-3px; width:13px; height:13px; border-radius:50%; background:var(--bg2); border:0.8px solid var(--stroke2); color:var(--orange); display:grid; place-items:center; z-index:5;">
                  <div style="width:7px; height:7px;" x-html="getIconSvg(getStudentLevelInfo(currentStudent.total).current.icon)"></div>
                </div>
              </template>
            </div>
            
            <!-- Info Texts -->
            <div style="display:flex; flex-direction:column; align-items:flex-start; text-align:right;">
              <span style="font-size:11px; font-weight:700; color:var(--txt); line-height:1.2;" x-text="isAdmin ? (ADMIN_ACCOUNTS.find(a => a.id === activeId)?.name || 'مشرف') : currentStudent.name"></span>
              <span style="font-size:9px; font-weight:600; line-height:1.2; display:flex; align-items:center; gap:2px; margin-top:1px;"
                    :style="isAdmin ? { color: '#ef4444' } : { color: '#ffb27a' }">
                <div style="width:9px; height:9px;" x-html="isAdmin ? getIconSvg('settings') : getIconSvg('flame')"></div>
                <span x-text="isAdmin ? 'غرفة الإدارة' : currentStudent.total + ' شعلة'"></span>
              </span>
            </div>

          </div>
        </template>
      </div>



      <!-- VIEWS -->
      
      <!-- ============================================== -->
      <!-- 1. 🏆 LEADERBOARD VIEW -->
      <!-- ============================================== -->
      <div x-show="currentScreen === 'leaderboard'" class="page">
        <!-- Flames Guide Trigger -->
        <button @click="showFlamesGuideModal = true" 
                class="glass" 
                style="width: 100%; padding: 11px 16px; margin-bottom: 14px; border-radius: 14px; border: 1px solid var(--stroke); display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: rgba(249,115,22,0.04); transition: all 0.2s;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 16px; height: 16px; color: var(--orange);" x-html="getIconSvg('help-circle')"></div>
            <span style="font-size: 12px; font-weight: 700; color: var(--txt);">كيف أحصل على شعلات؟ 🔥</span>
          </div>
          <div style="width: 14px; height: 14px; color: var(--txt-faint);" x-html="getIconSvg('chevron-left')"></div>
        </button>

        <!-- Podium (only for individual mode) -->
        <template x-if="lbMode === 'individual'">
          <div class="podium-wrap">
            <div class="podium">
              
              <!-- 2nd Place -->
              <template x-if="getPodiumStudents()[0] && getPodiumStudents()[0].id !== 'dummy'">
                <div class="pod pod-2" @click="viewOnlyStudentId = getPodiumStudents()[0].id" style="cursor:pointer;">
                  <div class="pod-av" 
                       style="position:relative;"
                       :style="{
                         'border-color': avatarColorMap[getPodiumStudents()[0].avatarColor || 'emerald'],
                         'background': 'linear-gradient(160deg,' + avatarColorGlowMap[getPodiumStudents()[0].avatarColor || 'emerald'] + ',rgba(5,150,105,.04))',
                         'color': avatarColorLightMap[getPodiumStudents()[0].avatarColor || 'emerald'],
                         'box-shadow': '0 0 15px ' + avatarColorGlowMap[getPodiumStudents()[0].avatarColor || 'emerald']
                       }">
                    <div style="width:24px; height:24px;" x-html="getIconSvg(getPodiumStudents()[0].avatarIcon || 'user')"></div>
                    <!-- Level Badge -->
                    <div style="position:absolute; bottom:-4px; right:-4px; width:18px; height:18px; border-radius:50%; background:var(--bg2); border:1px solid var(--stroke2); color:var(--orange); display:grid; place-items:center; z-index:5;"
                         :title="getStudentLevelInfo(getPodiumStudents()[0].total).current.label">
                      <div style="width:10px; height:10px;" x-html="getIconSvg(getStudentLevelInfo(getPodiumStudents()[0].total).current.icon)"></div>
                    </div>
                  </div>
                  <div class="pod-name" style="display:inline-flex; align-items:center; gap:4px; justify-content:center; width:100%;">
                    <span x-text="getPodiumStudents()[0].name"></span>
                    <template x-if="getPodiumStudents()[0].id === activeId">
                      <span style="font-size:8px; font-weight:700; background:rgba(249,115,22,0.2); border:1px solid rgba(249,115,22,0.4); color:#ffb27a; padding:1px 4px; border-radius:4px;">أنت</span>
                    </template>
                  </div>

                  <div class="pod-base" :style="getPodiumStudents()[0].id === activeId ? 'border-color:rgba(249,115,22,0.6) !important; box-shadow:0 0 20px rgba(249,115,22,0.3) !important;' : ''">
                    <div class="pod-rank">2</div>
                    <div class="pod-pts e" x-text="getPodiumStudents()[0].total"></div>
                  </div>
                </div>
              </template>

              <!-- 1st Place (Center & Tallest) -->
              <template x-if="getPodiumStudents()[1] && getPodiumStudents()[1].id !== 'dummy'">
                <div class="pod pod-1" @click="viewOnlyStudentId = getPodiumStudents()[1].id" style="cursor:pointer;">
                  <div class="pod-av"
                       style="position:relative;"
                       :style="{
                         'border-color': avatarColorMap[getPodiumStudents()[1].avatarColor || 'orange'],
                         'background': 'linear-gradient(160deg,' + avatarColorGlowMap[getPodiumStudents()[1].avatarColor || 'orange'] + ',rgba(249,115,22,.05))',
                         'color': avatarColorLightMap[getPodiumStudents()[1].avatarColor || 'orange'],
                         'box-shadow': '0 0 25px ' + avatarColorGlowMap[getPodiumStudents()[1].avatarColor || 'orange']
                       }">
                    <div class="pod-crown">
                      <!-- Crown Icon -->
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z" fill="currentColor" opacity="0.3"/>
                        <path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z"/>
                        <circle cx="12" cy="19" r="1"/>
